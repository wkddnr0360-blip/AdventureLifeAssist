<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudyGram</title>
    <style>
        /* 인스타그램 오리지널 컬러 & 플랫 디자인 */
        :root { 
            --bg: #fafafa; --card: #ffffff; --text: #262626; --border: #dbdbdb; 
            --primary: #0095f6; --primary-light: #e0f1ff; --light-gray: #8e8e8e; 
            --success: #4cd964; --danger: #ed4956;
            
            --color-criminal: #ed4956; /* 인스타 레드 */
            --color-police: #3897f0;   /* 인스타 블루 */
            --color-const: #a307ba;    /* 인스타 퍼플 */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 💡 높이 고정 및 외부 스크롤 완벽 차단 (화면 좁아짐 현상 해결) */
        html, body { width: 100%; height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: var(--text); }
        
        /* 앱 컨테이너 내부에서만 스크롤이 발생하도록 구조화 */
        .app-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: var(--bg); display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); box-sizing: border-box; }
        
        /* 로그인 오버레이 */
        #login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transition: opacity 0.3s; }
        .login-box { width: 100%; max-width: 300px; text-align: center; }
        .login-box h1 { font-family: 'Brush Script MT', cursive; font-size: 3.5rem; margin-bottom: 20px; color: var(--text); }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 4px; background: #fafafa; font-size: 0.95rem; }
        .login-box input:focus { outline: none; border-color: var(--light-gray); }
        .login-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        
        /* 헤더 (상단 고정) */
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; height: 60px; }
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 1.8rem; color: var(--text); letter-spacing: 1px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--text); padding: 0; display: flex; align-items: center; }

        /* 토스트 알림 */
        #toast { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(38,38,38,0.9); color: white; padding: 12px 24px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 1500; white-space: nowrap; }
        #toast.show { opacity: 1; }
        
        /* 💡 탭 컨텐츠 영역 (하단 바에 절대 안 가려지는 스크롤 영역) */
        .content-area { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; background: var(--bg); position: relative; padding-bottom: 20px; }
        .tab-content { display: none; min-height: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- [탭 1] 홈 화면 --- */
        .home-dashboard { background: white; padding: 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .profile-top { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar-container { width: 85px; height: 85px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); margin-right: 25px; flex-shrink: 0; }
        .avatar-inner { width: 100%; height: 100%; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 5px; }
        .avatar-inner img { width: 100%; height: 100%; object-fit: contain; }
        
        .profile-stats { flex: 1; display: flex; justify-content: space-between; text-align: center; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-num { font-size: 1.15rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: var(--text); margin-top: 2px; }

        .today-info { font-size: 0.95rem; line-height: 1.5; margin-top: 10px; }
        .subject-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9rem; margin-top: 10px; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .progress-wrap { margin-top: 25px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #efefef; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.5s ease; }

        /* 💡 홈: AI 피드 섹션 */
        .feed-section { background: white; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 300px; }
        .feed-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.95rem; }
        .feed-nav button { background: none; border: none; cursor: pointer; color: var(--light-gray); font-size: 1.1rem; padding: 5px; }
        
        .ai-generate-btn { display: block; width: calc(100% - 40px); margin: 20px auto; padding: 14px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; text-align: center; font-weight: 800; border-radius: 12px; cursor: pointer; border: none; font-size: 1rem; box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3); transition: transform 0.2s; }
        .ai-generate-btn:active { transform: scale(0.96); }
        .ai-generate-btn:disabled { opacity: 0.7; cursor: not-allowed; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* AI 피드 카드 (인스타 게시물 스타일) */
        .feed-card { margin-bottom: 20px; padding-bottom: 20px; }
        .feed-header { display: flex; align-items: center; padding: 12px 20px; }
        .feed-avatar { width: 36px; height: 36px; border-radius: 50%; background: #f0f8ff; border: 1px solid var(--border); margin-right: 12px; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 2px; }
        .feed-avatar img { width: 100%; height: 100%; object-fit: contain; }
        .feed-title-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
        .feed-time { font-size: 0.8rem; color: var(--light-gray); display: flex; align-items: center; gap: 10px; }
        
        .feed-body { padding: 0 20px; font-size: 0.95rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; margin-bottom: 15px; }
        
        .feed-log-box { padding: 0 20px; margin-top: 10px; }
        .feed-task-item { display: flex; margin-bottom: 8px; align-items: flex-start; font-size: 0.9rem; }
        .feed-task-time { font-weight: bold; width: 45px; color: var(--light-gray); flex-shrink: 0; }
        .feed-task-text { flex: 1; color: var(--text); }
        
        .feed-footer { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #efefef; margin-top: 15px; font-size: 0.9rem; font-weight: 600; }
        .btn-copy { background: #f0f8ff; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; cursor: pointer; font-size: 0.85rem; padding: 6px 12px; border-radius: 20px; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.9); background: var(--primary); color: white; }

        /* --- [탭 2] 전체 달력 --- */
        .calendar-wrap { padding: 20px; background: white; min-height: 100%; }
        .calendar-legend { display: flex; justify-content: center; gap: 15px; font-size: 0.8rem; margin-bottom: 20px; color: var(--light-gray); }
        .legend-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .cal-header { text-align: center; font-size: 0.75rem; color: var(--light-gray); font-weight: 600; padding-bottom: 5px; }
        .cal-cell { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-size: 0.85rem; font-weight: bold; color: white; cursor: pointer; position: relative; border-radius: 6px; }
        .cal-cell.empty { background: transparent; cursor: default; }
        .cal-cell.today { border: 2px solid #262626; transform: scale(1.15); z-index: 2; box-shadow: 0 3px 8px rgba(0,0,0,0.3); }

        /* --- [탭 3] 플래너 --- */
        .planner-wrap { background: white; min-height: 100%; position: relative; padding-bottom: 60px; }
        .date-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); font-weight: 600; position: sticky; top: 0; z-index: 20; }
        .date-nav button { font-size: 1.2rem; background: none; border: none; color: var(--light-gray); cursor: pointer; padding: 5px; }
        
        .timeline-wrap { padding: 15px 20px; }
        .timeline-row { display: flex; position: relative; padding-bottom: 20px; }
        .timeline-row:last-child { padding-bottom: 0; }
        .timeline-row:last-child .track .line { display: none; }
        
        .time { width: 45px; font-size: 0.8rem; color: var(--light-gray); font-weight: 600; text-align: right; padding-right: 12px; padding-top: 8px; }
        
        .track { position: relative; width: 20px; display: flex; justify-content: center; }
        .track .node { position: absolute; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #efefef; border: 2px solid var(--border); z-index: 2; transition: 0.2s; }
        .track .line { position: absolute; top: 22px; width: 2px; height: calc(100% - 10px); background: #efefef; z-index: 1; }
        
        .timeline-row.is-target .track .node { border-color: var(--primary); background: white; }
        .timeline-row.is-actual .track .node { border-color: var(--success); background: var(--success); }
        
        .content { flex: 1; padding-left: 12px; display: flex; flex-direction: column; justify-content: center; }
        .input-box { width: 100%; border: none; outline: none; font-size: 0.95rem; padding: 8px 0; border-bottom: 1px solid #efefef; color: var(--text); background: transparent; margin-bottom: 6px; font-weight: 500; }
        .input-box:focus { border-bottom-color: var(--light-gray); }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-action { padding: 5px 14px; font-size: 0.75rem; border-radius: 12px; border: 1px solid var(--border); background: white; color: var(--text); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-action.btn-target.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .btn-action.btn-actual.active { background: var(--success); color: white; border-color: var(--success); }

        /* 💡 퀵 이동 플로팅 버튼 */
        .fab-now { position: fixed; bottom: 80px; right: 20px; width: 55px; height: 55px; background: var(--text); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 50; font-size: 0.8rem; text-align: center; line-height: 1.2; display: none; transition: transform 0.2s; }
        .fab-now:active { transform: scale(0.9); }
        .fab-now.show { display: flex; }

        /* 💡 하단 네비게이션바 (절대 밀려 내려가지 않음) */
        .bottom-nav { width: 100%; height: 60px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; transition: 0.2s; opacity: 0.3; height: 100%; }
        .nav-item.active { opacity: 1; }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

<div class="app-container">

                {text:"형사법", color:"var(--color-criminal)"}, {text:"형사법", color:"var(--color-criminal)"}, {text:"형사법", color:"var(--color-criminal)"}, {text:"형사법", color:"var(--color-criminal)"}, {text:"형사법", color:"var(--color-criminal)"},
                {text:"헌법", color:"var(--color-const)"}, {text:"헌법", color:"var(--color-const)"}
            ];
            return arr21[diff % 21];
        } else {
            const arr4 = [
                {text:"경찰학", color:"var(--color-police)"},
                {text:"형사법", color:"var(--color-criminal)"}, {text:"형사법", color:"var(--color-criminal)"},
                {text:"헌법", color:"var(--color-const)"}
            ];
            return arr4[(diff - 42) % 4];
        }
    }

    let toastTimeout;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    window.switchTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        document.getElementById(`nav-${tabName}`).classList.add('active');
        
        if(tabName === 'planner') document.getElementById('fab-now').classList.add('show');
        else document.getElementById('fab-now').classList.remove('show');

        if(tabName === 'home') {
            homeFeedDate = getAdjustedTodayStr();
            updateHomeTopStats(); 
            renderHomeFeed();
        }
        document.getElementById('main-scroll').scrollTo({top:0, behavior:'smooth'});
    };

    window.handleLogin = async function() {
        const id = document.getElementById('userid').value.trim();
        const pw = document.getElementById('userpw').value.trim();
        if(!id || !pw) return;
        
        document.getElementById('login-btn').innerText = "로딩 중...";
        try {
            const userRef = doc(db, "users", id);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists() && userSnap.data().password !== pw) {
                document.getElementById('login-msg').innerText = "비밀번호 불일치";
                document.getElementById('login-btn').innerText = "로그인";
                return;
            } else if (!userSnap.exists()) {
                await setDoc(userRef, { password: pw, createdAt: serverTimestamp() });
            }
            currentUser = id;
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 300);
            
            const todayStr = getAdjustedTodayStr();
            viewingDate = (todayStr >= START_DATE_STR && todayStr <= END_DATE_STR) ? todayStr : START_DATE_STR;
            homeFeedDate = viewingDate;
            await loadData();
        } catch (e) { document.getElementById('login-msg').innerText = "네트워크 오류"; document.getElementById('login-btn').innerText = "로그인"; }
    };

    async function loadData() {
        try {
            const dataSnap = await getDoc(doc(db, "users_data", currentUser));
            let mainParsed = dataSnap.exists() && dataSnap.data().content ? JSON.parse(dataSnap.data().content) : {};
            if(!mainParsed.dailyRecords) mainParsed.dailyRecords = "{}";
            appData = JSON.parse(mainParsed.dailyRecords);
            
            buildCalendarGrid();
            renderPlannerUI();
            updateHomeTopStats();
            renderHomeFeed();
        } catch (e) {}
    }

    let saveTimeout;
    window.debouncedSave = function() {
        updateHomeTopStats(); 
        if(viewingDate === homeFeedDate) renderHomeFeed();     
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveToFirebase, 1000); 
    };

    async function saveToFirebase() {
        if(!currentUser) return;
        const dateObj = appData[viewingDate] || { studygram: { timetable: {} } };
        
        document.querySelectorAll('.timeline-row').forEach(slot => {
            const time = slot.dataset.time; 
            const input = slot.querySelector('.input-box').value.trim();
            const isTarget = slot.querySelector('.btn-target').classList.contains('active');
            const isActual = slot.querySelector('.btn-actual').classList.contains('active');
            
            if(input || isTarget || isActual) {
                dateObj.studygram.timetable[time] = { text: input, target: isTarget, actual: isActual };
            } else {
                delete dateObj.studygram.timetable[time];
            }
        });
        appData[viewingDate] = dateObj;

        try {
            const dataSnap = await getDoc(doc(db, "users_data", currentUser));
            let mainParsed = dataSnap.exists() && dataSnap.data().content ? JSON.parse(dataSnap.data().content) : {};
            mainParsed.dailyRecords = JSON.stringify(appData);
            await setDoc(doc(db, "users_data", currentUser), { content: JSON.stringify(mainParsed) }, { merge: true });
        } catch(e) {}
    }

    function buildCalendarGrid() {
        const grid = document.getElementById('full-calendar-grid');
        grid.innerHTML = "";
        const days = ["일", "월", "화", "수", "목", "금", "토"];
        days.forEach(w => grid.innerHTML += `<div class="cal-header">${w}</div>`);
        for(let i=0; i<6; i++) grid.innerHTML += `<div class="cal-cell empty"></div>`; 
        
        const todayStr = getAdjustedTodayStr(); 
        let d = new Date(2026, 5, 13);
        const endD = new Date(2026, 7, 21);
        while(d <= endD) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dt = String(d.getDate()).padStart(2, '0');
            const str = `${y}-${m}-${dt}`;
            
            let subject = getSubjectForDate(str);
            grid.innerHTML += `
                <div class="cal-cell ${str === todayStr ? 'today' : ''}" style="background: ${subject.color};" onclick="jumpToPlanner('${str}')">
                    <span class="cal-date">${d.getDate()}</span>
                </div>
            `;
            d.setDate(d.getDate() + 1);
        }
    }

    window.jumpToPlanner = function(dateStr) {
        viewingDate = dateStr;
        renderPlannerUI();
        switchTab('planner');
    }

    window.changePlannerDate = function(offset) {
        const [y, m, d] = viewingDate.split('-');
        let dateObj = new Date(y, m-1, d);
        dateObj.setDate(dateObj.getDate() + offset);
        if(dateObj >= new Date(2026, 5, 13) && dateObj <= new Date(2026, 7, 21)) {
            viewingDate = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
            renderPlannerUI();
        }
    };

    function renderPlannerUI() {
        const subj = getSubjectForDate(viewingDate);
        document.getElementById('planner-date-display').innerText = viewingDate;
        document.getElementById('planner-subj-display').innerText = subj.text;
        document.getElementById('planner-subj-display').style.color = subj.color.includes('gradient') ? 'var(--text)' : subj.color;
        
        const container = document.getElementById('timeline-container');
        container.innerHTML = "";
        const data = (appData[viewingDate] && appData[viewingDate].studygram) ? appData[viewingDate].studygram : { timetable: {} };

        for(let i=0; i<48; i++) {
            let totalMins = (5 * 60) + (i * 30);
            let h = Math.floor(totalMins / 60); 
            let m = totalMins % 60;
            let timeKey = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            let displayTime = `${String(h%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            
            let slotData = data.timetable[timeKey] || { text: "", target: false, actual: false };
            let stateClass = slotData.actual ? "is-actual" : (slotData.target ? "is-target" : "");

            container.innerHTML += `
                <div class="timeline-row ${stateClass}" id="slot-${timeKey}" data-time="${timeKey}">
                    <div class="time">${displayTime}</div>
                    <div class="track"><div class="node"></div><div class="line"></div></div>
                    <div class="content">
                        <input type="text" class="input-box" value="${slotData.text}" placeholder="계획 입력" oninput="debouncedSave()" enterkeyhint="done">
                        <div class="btn-group">
                            <button class="btn-action btn-target ${slotData.target ? 'active' : ''}" onclick="toggleTarget(this)">목표</button>
                            <button class="btn-action btn-actual ${slotData.actual ? 'active' : ''}" onclick="toggleActual(this)">완료</button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    window.toggleTarget = function(btn) { btn.classList.toggle('active'); updateNodeColor(btn.closest('.timeline-row')); debouncedSave(); };
    window.toggleActual = function(btn) { btn.classList.toggle('active'); updateNodeColor(btn.closest('.timeline-row')); debouncedSave(); };
    function updateNodeColor(row) {
        row.classList.remove('is-target', 'is-actual');
        if(row.querySelector('.btn-actual').classList.contains('active')) row.classList.add('is-actual');
        else if(row.querySelector('.btn-target').classList.contains('active')) row.classList.add('is-target');
    }

    window.focusCurrentTime = function() {
        const now = new Date();
        let logicH = now.getHours() < 5 ? now.getHours() + 24 : now.getHours();
        let timeKey = `${String(logicH).padStart(2,'0')}:${now.getMinutes() >= 30 ? '30' : '00'}`;
        const currentSlot = document.getElementById(`slot-${timeKey}`);
        if(currentSlot) {
            document.getElementById('main-scroll').scrollTo({ top: currentSlot.offsetTop - 50, behavior: 'smooth' });
            showToast("현재 시간으로 이동했습니다 📍");
        }
    }

    function updateHomeTopStats() {
        const todayStr = getAdjustedTodayStr();
        const validToday = (todayStr >= START_DATE_STR && todayStr <= END_DATE_STR) ? todayStr : START_DATE_STR;
        
        const [ty, tm, td] = todayStr.split('-');
        const dday = Math.round((new Date(2026, 7, 22) - new Date(ty, tm-1, td)) / 86400000);
        document.getElementById('dday-text').innerText = dday >= 0 ? `D-${dday}` : `D+${Math.abs(dday)}`;

        const subj = getSubjectForDate(validToday);
        document.getElementById('home-subject-badge').innerText = subj.text;
        document.getElementById('home-subject-badge').style.background = subj.color;

        const data = (appData[validToday] && appData[validToday].studygram) ? appData[validToday].studygram : { timetable: {} };
        let targets = 0, actuals = 0;
        for(let key in data.timetable) {
            if(data.timetable[key].target) targets++;
            if(data.timetable[key].actual) actuals++;
        }

        let percent = targets > 0 ? Math.round((actuals / targets) * 100) : (actuals > 0 ? 100 : 0);
        document.getElementById('today-target').innerText = (targets * 0.5).toFixed(1) + 'h';
        document.getElementById('today-actual').innerText = (actuals * 0.5).toFixed(1) + 'h';
        document.getElementById('progress-percent').innerText = Math.min(percent, 100) + '%';
        document.getElementById('home-progress-fill').style.width = Math.min(percent, 100) + '%';
    }

    // 💡 AI 결산 피드 시스템
    window.changeHomeFeedDate = function(offset) {
        const [y, m, d] = homeFeedDate.split('-');
        let dateObj = new Date(y, m-1, d);
        dateObj.setDate(dateObj.getDate() + offset);
        if(dateObj >= new Date(2026, 5, 13) && dateObj <= new Date(2026, 7, 21)) {
            homeFeedDate = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
            renderHomeFeed();
        }
    };

    window.copyAIText = function() {
        const text = appData[homeFeedDate]?.studygram?.aiFeed;
        if(text) {
            navigator.clipboard.writeText(text).then(() => showToast("인스타 피드 텍스트가 복사되었습니다! 📋"));
        }
    }

    function renderHomeFeed() {
        const isToday = (homeFeedDate === getAdjustedTodayStr());
        document.getElementById('home-feed-date-display').innerText = isToday ? "오늘의 피드" : `${homeFeedDate.slice(5).replace('-','.')} 피드`;

        const container = document.getElementById('home-feed-list');
        const dataObj = (appData[homeFeedDate] && appData[homeFeedDate].studygram) ? appData[homeFeedDate].studygram : {};
        const slots = dataObj.timetable || {};
        
        let memoList = [];
        for(let i=0; i<48; i++) {
            let h = Math.floor(((5 * 60) + (i * 30)) / 60);
            let m = ((5 * 60) + (i * 30)) % 60;
            let timeKey = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            
            if(slots[timeKey] && slots[timeKey].text.trim() !== '') {
                memoList.push({ time: `${String(h%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`, text: slots[timeKey].text });
            }
        }

        if(dataObj.aiFeed) {
            container.innerHTML = `
                <div class="feed-card">
                    <div class="feed-header">
                        <div class="feed-avatar"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif"></div>
                        <div class="feed-title-name">StudyGram_AI ✨</div>
                        <div class="feed-time" style="display:flex; justify-content:space-between; flex:1;">
                            일일 결산
                            <button onclick="generateAIFeed()" style="background:none; border:none; color:var(--light-gray); font-size:0.75rem; cursor:pointer; font-weight:bold;">🔄 다시 생성</button>
                        </div>
                    </div>
                    <div class="feed-body">${dataObj.aiFeed}</div>
                    <div class="feed-footer">
                        <div>
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:8px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            ${memoList.length}개의 기록
                        </div>
                        <button class="btn-copy" onclick="copyAIText()">📋 복사하기</button>
                    </div>
                </div>
            `;
            document.getElementById('ai-btn').style.display = 'none';
        } else if (memoList.length > 0) {
            let listHtml = memoList.map(s => `<div class="feed-task-item"><div class="feed-task-time">${s.time}</div><div class="feed-task-text">📝 ${s.text}</div></div>`).join('');
            container.innerHTML = `
                <div class="feed-log-box">
                    <div style="font-weight:bold; color:var(--primary); margin-bottom:15px; font-size:0.95rem;">작성된 메모 리스트</div>
                    ${listHtml}
                </div>
            `;
            document.getElementById('ai-btn').style.display = 'block';
            document.getElementById('ai-btn').disabled = false;
        } else {
            container.innerHTML = `
                <div style="text-align:center; padding: 50px 20px; color: var(--light-gray); font-size: 0.95rem;">
                    <svg viewBox="0 0 24 24" width="45" height="45" stroke="currentColor" fill="none" stroke-width="1.5" style="margin-bottom:15px; opacity:0.3;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><br>
                    메모가 작성된 플랜이 없습니다.<br>플래너에 계획을 적어보세요!
                </div>
            `;
            document.getElementById('ai-btn').style.display = 'none';
        }
    }

    // 💡 Gemini AI 호출 로직 (다중 Fallback 모델 탑재)
    window.generateAIFeed = async function() {
        const dataObj = appData[homeFeedDate].studygram;
        const slots = dataObj.timetable || {};
        let memoText = "";
        
        for(let key in slots) {
            if(slots[key].text.trim() !== "") {
                let h = parseInt(key.split(':')[0]);
                let m = key.split(':')[1];
                memoText += `- ${String(h%24).padStart(2,'0')}:${m} : ${slots[key].text}\n`;
            }
        }

        if(!memoText) return showToast("작성된 메모가 없습니다.");

        const btn = document.getElementById('ai-btn');
        btn.innerText = "✨ AI가 일기를 작성 중입니다...";
        btn.disabled = true;

        const prompt = `다음은 수험생이 오늘 하루 시간대별로 공부한 메모 기록입니다:\n\n${memoText}\n\n이 기록을 바탕으로 인스타그램 피드에 올릴 법한 자연스럽고 동기부여가 되는 짧은 공부 결산 일기를 1문단으로 작성해주세요. 내용 요약과 함께 힘이 나는 멘트, 그리고 마지막엔 관련 해시태그 3~4개를 달아주세요.`;
        const reqBody = JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] });

        try {
            // 1순위: Gemini 3.1 Flash Lite
            let response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: reqBody
            });

            // 2순위: 모델명 변경 등으로 실패 시 2.5버전으로 자동 Fallback 재시도
            if (!response.ok) {
                console.warn("3.1 모델 호출 실패, 2.5 모델로 재시도합니다.");
                response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: reqBody
                });
            }

            // 3순위: 그래도 실패 시 1.5버전으로 최후 보루 재시도
            if (!response.ok) {
                console.warn("2.5 모델 호출 실패, 1.5 모델로 재시도합니다.");
                response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: reqBody
                });
            }

            if (!response.ok) throw new Error("API 호출 실패");

            const resData = await response.json();
            const aiText = resData.candidates[0].content.parts[0].text;

            appData[homeFeedDate].studygram.aiFeed = aiText;
            const dataSnap = await getDoc(doc(db, "users_data", currentUser));
            let mainParsed = dataSnap.exists() && dataSnap.data().content ? JSON.parse(dataSnap.data().content) : {};
            mainParsed.dailyRecords = JSON.stringify(appData);
            await setDoc(doc(db, "users_data", currentUser), { content: JSON.stringify(mainParsed) }, { merge: true });
            
            showToast("AI 피드 작성 완료! ✨");
            renderHomeFeed();
        } catch(e) {
            showToast("AI 호출 중 오류가 발생했습니다.");
            btn.innerText = "✨ AI 일일 피드 생성하기";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
