<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주야비휴 프리미엄 스케줄러 & AI</title>
    <style>
        /* 프리미엄 폰트 & 초기화 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            width: 100%;
            max-width: 1050px;
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            padding: 30px;
        }

        .header { margin-bottom: 25px; text-align: center; }
        .header h1 { font-size: 26px; font-weight: 800; color: #0F172A; letter-spacing: -0.5px; }

        /* 설정 패널 */
        .control-panel {
            display: flex; flex-wrap: wrap; gap: 15px;
            background: #F8FAFC; padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid #E2E8F0;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        .input-group label { font-size: 13px; font-weight: 700; color: #475569; }
        input, select, button {
            padding: 10px 12px; border: 1px solid #CBD5E1; border-radius: 8px;
            font-family: inherit; font-size: 14px; outline: none; transition: all 0.2s;
            background: #FFFFFF;
        }
        input:focus, select:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        button.primary-btn { background: #0F172A; color: white; border: none; font-weight: 600; cursor: pointer; }
        button.primary-btn:hover { background: #334155; }

        /* 범례 */
        .legend {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
            margin-bottom: 20px; font-size: 13px; font-weight: 600; color: #334155;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }
        
        /* ★ 컬러 개편 (업무/자유는 톤온톤, 수면은 보색) */
        .bg-work { background-color: #1E3A8A; } /* 딥 네이비 (업무) */
        .bg-free { background-color: #DBEAFE; } /* 아주 연한 아이스블루 (자유) */
        .bg-sleep-main { background-color: #7C3AED; } /* 딥 퍼플 (정상 수면) */
        .bg-sleep-strat { background-color: #C4B5FD; } /* 라이트 퍼플 (전략적 수면) */

        /* 스크롤 그리드 */
        .grid-wrapper {
            width: 100%; overflow-x: auto; border-radius: 12px;
            border: 1px solid #E2E8F0; background: #FFFFFF;
        }
        .time-grid {
            display: inline-grid;
            grid-template-columns: 140px repeat(48, minmax(18px, 1fr)); /* 140px로 늘려 글자 깨짐 방지 */
            min-width: max-content; border-bottom: 1px solid #F1F5F9;
        }
        .time-grid:last-child { border-bottom: none; }
        .header-row { background: #F8FAFC; position: sticky; top: 0; z-index: 5; border-bottom: 1px solid #E2E8F0; }
        
        .cell { padding: 8px 0; text-align: center; font-size: 11px; color: #64748B; border-right: 1px dashed #E2E8F0; }
        .cell.time-header { grid-column: span 2; border-right: 1px solid #CBD5E1; font-weight: 700; }
        
        /* ★ 왼쪽 요일 글자 밀림 방지 */
        .date-label {
            position: sticky; left: 0; background: #FFFFFF; padding: 12px 15px;
            font-size: 13px; font-weight: 700; color: #1E293B;
            border-right: 2px solid #E2E8F0; z-index: 10;
            white-space: nowrap; /* 글자 쪼개짐 원천 차단 */
            display: flex; align-items: center;
        }
        .header-row .date-label { background: #F8FAFC; z-index: 15; }

        .block { height: 100%; transition: opacity 0.2s; cursor: pointer; }
        .block:hover { opacity: 0.7; }
        
        /* ★ 현재 시간 인디케이터 (모던 스타일) */
        .current-time-block {
            position: relative;
            background-color: #EF4444 !important; /* 강력한 레드 포인트 */
            z-index: 20;
            transform: scaleY(1.1);
        }
        .current-time-block::before {
            content: 'NOW';
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #EF4444;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 12px;
            z-index: 25;
        }

        /* 툴팁 */
        .tooltip {
            position: fixed; background: #0F172A; color: #FFFFFF; padding: 8px 12px;
            border-radius: 6px; font-size: 13px; font-weight: 500; pointer-events: none;
            opacity: 0; transform: translateY(5px); transition: all 0.2s; z-index: 999;
        }

        /* AI 코치 패널 */
        .ai-panel { margin-top: 30px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 12px; padding: 20px; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px;}
        .ai-header h3 { font-size: 16px; color: #0F172A; display: flex; align-items: center; gap: 8px; }
        .ai-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .ai-response {
            background: white; padding: 15px; border-radius: 8px; border: 1px solid #E2E8F0;
            font-size: 14px; line-height: 1.6; color: #334155; min-height: 60px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🚓 2026 주야비휴 스케줄러 & 코치</h1>
    </div>
    
    <div class="control-panel">
        <div class="input-group">
            <label>기준 근무 (주기 세팅)</label>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="baseDate" style="flex: 1;">
                <select id="baseShift" style="flex: 1;">
                    <option value="0">주간 근무</option>
                    <option value="1">야간 근무</option>
                    <option value="2">비번 (퇴근)</option>
                    <option value="3">휴무 (휴식)</option>
                </select>
            </div>
        </div>
        <div class="input-group" style="max-width: 200px;">
            <label>조회 시작일</label>
            <input type="date" id="targetDate">
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot bg-work"></div>업무 (집중)</div>
        <div class="legend-item"><div class="dot bg-free"></div>자유 (휴식)</div>
        <div class="legend-item"><div class="dot bg-sleep-main"></div>정상 수면 (밤잠)</div>
        <div class="legend-item"><div class="dot bg-sleep-strat"></div>전략적 수면 (낮잠)</div>
    </div>

    <div class="grid-wrapper" id="gridContainer"></div>

    <div class="ai-panel">
        <div class="ai-header">
            <h3>✨ 최신 AI 실시간 컨디션 분석</h3>
            <div class="ai-controls">
                <select id="aiModelSelect">
                    <option value="gemini-3.1-flash-light">Gemini 3.1 Flash Light</option>
                    <option value="gemini-3-flash-live">Gemini 3 Flash Live</option>
                    <option value="gemma-4-31b">Gemma 4 31B (통합 API)</option>
                </select>
                <input type="password" id="apiKeyInput" placeholder="API Key 입력" style="width: 180px;">
                <button class="primary-btn" onclick="askAI()">내 상태 분석하기</button>
            </div>
        </div>
        <div id="aiResponse" class="ai-response">
            API 키를 입력하고 모델을 선택한 뒤 버튼을 누르면, 현재 시간과 근무 스케줄을 분석하여 실시간 팁을 제공합니다. (새로고침해도 설정이 유지됩니다.)
        </div>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
    const shiftPattern = {
        0: { name: '주간', blocks: Array(48).fill(2) },
        1: { name: '야간', blocks: Array(48).fill(2) },
        2: { name: '비번', blocks: Array(48).fill(2) },
        3: { name: '휴무', blocks: Array(48).fill(2) }
    };
    function fillBlocks(shiftIdx, start, length, type) {
        for(let i = start; i < start + length; i++) shiftPattern[shiftIdx].blocks[i] = type;
    }
    
    fillBlocks(0, 0, 13, 3); fillBlocks(0, 18, 18, 1); fillBlocks(0, 46, 2, 3);
    fillBlocks(1, 0, 13, 3); fillBlocks(1, 28, 3, 4); fillBlocks(1, 36, 12, 1);
    fillBlocks(2, 0, 18, 1); fillBlocks(2, 20, 8, 4); fillBlocks(2, 46, 2, 3);
    fillBlocks(3, 0, 14, 3); fillBlocks(3, 46, 2, 3);

    const typeMap = { 
        1: {cls: 'bg-work', label:'근무 중'}, 2: {cls: 'bg-free', label:'자유 시간'}, 
        3: {cls: 'bg-sleep-main', label:'정상 수면'}, 4: {cls: 'bg-sleep-strat', label:'전략적 수면'}
    };
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    const elBaseDate = document.getElementById('baseDate');
    const elBaseShift = document.getElementById('baseShift');
    const elTargetDate = document.getElementById('targetDate');
    const elApiKey = document.getElementById('apiKeyInput');
    const elModelSelect = document.getElementById('aiModelSelect');
    const elGridContainer = document.getElementById('gridContainer');
    const elTooltip = document.getElementById('tooltip');

    let currentLiveShiftName = "";
    let currentLiveBlockType = "";

    function getSafeDate(dateString) {
        const parts = dateString.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    // ★ 로컬스토리지 완벽 보존 로직
    function init() {
        const todayStr = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        
        elBaseDate.value = localStorage.getItem('shiftBaseDate') || todayStr;
        elBaseShift.value = localStorage.getItem('shiftBaseIndex') || '0';
        elTargetDate.value = localStorage.getItem('shiftTargetDate') || todayStr;
        
        if(localStorage.getItem('savedApiKey')) elApiKey.value = localStorage.getItem('savedApiKey');
        if(localStorage.getItem('savedAiModel')) elModelSelect.value = localStorage.getItem('savedAiModel');

        [elBaseDate, elBaseShift, elTargetDate].forEach(el => {
            el.addEventListener('change', renderGrid);
        });

        // 설정 변경 시 스토리지 자동 저장
        elApiKey.addEventListener('change', () => localStorage.setItem('savedApiKey', elApiKey.value));
        elModelSelect.addEventListener('change', () => localStorage.setItem('savedAiModel', elModelSelect.value));
        
        renderGrid();
        setInterval(markCurrentTime, 60000); 
    }

    function renderGrid() {
        localStorage.setItem('shiftBaseDate', elBaseDate.value);
        localStorage.setItem('shiftBaseIndex', elBaseShift.value);
        localStorage.setItem('shiftTargetDate', elTargetDate.value);

        const baseD = getSafeDate(elBaseDate.value);
        const targetD = getSafeDate(elTargetDate.value);
        const baseIndex = parseInt(elBaseShift.value);
        const diffDays = Math.round((targetD - baseD) / (1000 * 60 * 60 * 24));

        let html = '';
        html += '<div class="time-grid header-row"><div class="date-label">근무일자</div>';
        for(let i = 0; i < 24; i++) html += `<div class="cell time-header">${i.toString().padStart(2, '0')}</div>`;
        html += '</div>';

        for(let i = 0; i < 7; i++) {
            const currentD = new Date(targetD);
            currentD.setDate(targetD.getDate() + i);
            const dateStrId = currentD.toISOString().split('T')[0]; 
            
            const month = (currentD.getMonth() + 1).toString().padStart(2, '0');
            const date = currentD.getDate().toString().padStart(2, '0');
            const dayStr = dayNames[currentD.getDay()];
            
            const shiftIndex = ((baseIndex + diffDays + i) % 4 + 4) % 4;
            const shiftInfo = shiftPattern[shiftIndex];

            html += `<div class="time-grid" id="row-${dateStrId}" data-shiftname="${shiftInfo.name}">`;
            html += `<div class="date-label">${month}/${date}(${dayStr}) ${shiftInfo.name}</div>`;
            
            shiftInfo.blocks.forEach((typeCode, blockIndex) => {
                const typeData = typeMap[typeCode];
                const hour = Math.floor(blockIndex / 2).toString().padStart(2, '0');
                const min = (blockIndex % 2 === 0) ? '00' : '30';
                
                html += `<div class="block ${typeData.cls}" 
                              id="block-${dateStrId}-${blockIndex}"
                              data-time="${hour}:${min}" 
                              data-type="${typeData.label}"
                              onmouseenter="showTooltip(event)" 
                              ontouchstart="showTooltip(event)"
                              onmouseleave="hideTooltip()"
                              ontouchend="hideTooltip()"></div>`;
            });
            html += `</div>`;
        }
        elGridContainer.innerHTML = html;
        markCurrentTime(); 
    }

    function markCurrentTime() {
        document.querySelectorAll('.current-time-block').forEach(el => el.classList.remove('current-time-block'));
        
        const now = new Date();
        const todayStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        const blockIndex = (now.getHours() * 2) + (now.getMinutes() >= 30 ? 1 : 0);
        
        const targetBlock = document.getElementById(`block-${todayStr}-${blockIndex}`);
        const targetRow = document.getElementById(`row-${todayStr}`);
        
        if(targetBlock && targetRow) {
            targetBlock.classList.add('current-time-block');
            currentLiveShiftName = targetRow.getAttribute('data-shiftname');
            currentLiveBlockType = targetBlock.getAttribute('data-type');
        }
    }

    // ★ 최신 모델 API 호출 로직
    async function askAI() {
        const apiKey = elApiKey.value.trim();
        const selectedModel = elModelSelect.value;
        
        if(!apiKey) {
            alert("API 키를 입력해주세요!");
            return;
        }
        localStorage.setItem('savedApiKey', apiKey);
        localStorage.setItem('savedAiModel', selectedModel);

        const responseBox = document.getElementById('aiResponse');
        responseBox.innerHTML = `<i>${selectedModel} 모델을 통해 분석 중입니다... ⏳</i>`;

        const now = new Date();
        const timeStr = `${now.getHours()}시 ${now.getMinutes()}분`;
        
        if(!currentLiveShiftName) {
            responseBox.innerHTML = "❌ 달력 조회 기간에 '오늘'이 포함되어 있지 않아 분석할 수 없습니다.";
            return;
        }

        const prompt = `
당신은 교대근무자의 건강 코치입니다.
상태: [오늘 근무: ${currentLiveShiftName}], [현재 시간: ${timeStr}], [현재 스케줄: ${currentLiveBlockType}]
이 정보를 바탕으로 현재 시점에 맞는 행동 지침 1~2가지를 아주 짧고 명확하게 알려주세요. 3문장 이내로 작성하세요.
`;

        try {
            // 선택된 모델을 URL에 동적으로 바인딩
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if(!res.ok) throw new Error(`API 호출 실패 (상태 코드: ${res.status})`);

            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            responseBox.innerHTML = reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
        } catch (error) {
            responseBox.innerHTML = `<span style="color: #EF4444;">오류 발생: ${error.message}<br>선택한 모델명(${selectedModel})이 키 권한과 맞는지 확인하세요.</span>`;
        }
    }

    // 툴팁 로직
    window.showTooltip = function(e) {
        const target = e.target || e.touches[0].target;
        const time = target.getAttribute('data-time');
        const type = target.getAttribute('data-type');
        elTooltip.innerHTML = `<strong>${time}</strong><br/>${type}`;
        elTooltip.style.opacity = '1';
        elTooltip.style.transform = 'translateY(0)';
        
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        elTooltip.style.left = (clientX + 15) + 'px';
        elTooltip.style.top = (clientY + 15) + 'px';
    };
    window.hideTooltip = function() {
        elTooltip.style.opacity = '0';
        elTooltip.style.transform = 'translateY(5px)';
    };

    init();
</script>

</body>
</html>
