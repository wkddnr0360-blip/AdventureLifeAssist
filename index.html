<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F8FAFC" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>주야비휴 라이프 어시스트</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-main: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-panel: #F1F5F9;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --input-bg: #FFFFFF;
            
            --work-bg: #1E3A8A;     /* 짙은 네이비 (업무) */
            --free-bg: #DBEAFE;     /* 아주 연한 파랑 (자유) */
            --sleep-main: #7C3AED;  /* 딥 퍼플 (정상 수면) */
            --sleep-strat: #C4B5FD; /* 연한 퍼플 (전략 수면) */
        }

        body.dark-mode {
            --bg-main: #0F172A;
            --bg-card: #1E293B;
            --bg-panel: #334155;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --border: #475569;
            --input-bg: #1E293B;
            
            --work-bg: #3B82F6;
            --free-bg: #1E3A8A;
            --sleep-main: #A78BFA;
            --sleep-strat: #6D28D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Pretendard", -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; justify-content: center;
            padding: 20px 10px;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            width: 100%; max-width: 900px; /* 태블릿 보기 좋게 넓이 제한 */
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            padding: 25px;
        }

        /* 헤더 & D-Day */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .d-day-badge {
            background: #EF4444; color: white; padding: 6px 14px;
            border-radius: 20px; font-weight: 800; font-size: 14px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* 컨트롤 패널 */
        .control-panel {
            display: flex; flex-wrap: wrap; gap: 10px;
            background: var(--bg-panel); padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-sub); }
        input, select, button {
            padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 13px; outline: none;
            background: var(--input-bg); color: var(--text-main);
        }
        input:focus, select:focus { border-color: #3B82F6; }
        
        .btn-toggle {
            background: transparent; border: 1px solid var(--border); cursor: pointer;
            padding: 8px 12px; border-radius: 8px; font-weight: 600; width: 100%;
        }

        /* 범례 */
        .legend {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin-bottom: 15px; font-size: 11px; font-weight: 600; color: var(--text-main);
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
        .bg-work { background-color: var(--work-bg); }
        .bg-free { background-color: var(--free-bg); }
        .bg-sleep-main { background-color: var(--sleep-main); }
        .bg-sleep-strat { background-color: var(--sleep-strat); }

        /* ★★★ 가독성 최적화 스케줄 보드 (스크롤 없음) ★★★ */
        .schedule-board {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            background: var(--bg-card);
        }
        
        /* 보드 헤더 (시간축 가이드) */
        .board-header {
            display: flex;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }
        .board-left {
            width: 70px;
            flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: 700; color: var(--text-sub);
            border-right: 1px solid var(--border);
            padding: 8px 0;
        }
        .board-right-axis {
            flex-grow: 1;
            display: flex; justify-content: space-between;
            padding: 8px 5px;
            font-size: 10px; font-weight: 700; color: var(--text-sub);
        }
        
        /* 개별 날짜 행 */
        .board-row {
            display: flex;
            height: 44px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .board-row:last-child { border-bottom: none; }
        
        .row-label {
            width: 70px;
            flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            font-size: 12px; font-weight: 800; line-height: 1.2;
        }
        .row-label span.sub { font-size: 9px; color: var(--text-sub); font-weight: 600; margin-bottom: 2px; }
        
        /* 100% 꽉 차는 타임라인 */
        .row-timeline {
            flex-grow: 1;
            display: flex;
            position: relative;
            background: var(--bg-card);
        }
        .block {
            flex: 1; /* 48개 블록이 가로 길이를 정확히 N등분하여 꽉 채움 */
            height: 100%;
            transition: filter 0.2s;
            cursor: pointer;
        }
        .block:active { filter: brightness(0.7); }

        /* ★ 세련된 NOW 선 인디케이터 */
        .now-marker {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background-color: #EF4444;
            z-index: 10;
            box-shadow: 0 0 4px rgba(239, 68, 68, 0.5);
            pointer-events: none; /* 터치 방해 금지 */
        }
        .now-marker::after {
            content: 'NOW';
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            background: #EF4444;
            color: white;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: 800;
        }

        /* 트리노트 퀵 메모 */
        .memo-panel { background: var(--bg-panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .memo-panel label { display: block; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--input-bg);
            color: var(--text-main); font-family: inherit; font-size: 13px;
            resize: vertical; outline: none; line-height: 1.5;
        }

        /* 툴팁 */
        .tooltip {
            position: fixed; background: #0F172A; color: #FFFFFF; padding: 6px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 600; pointer-events: none;
            opacity: 0; transition: opacity 0.15s; z-index: 999; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* 모바일 패딩 다이어트 */
        @media (max-width: 600px) {
            body { padding: 0; }
            .app-container { border-radius: 0; padding: 15px; border: none; box-shadow: none; min-height: 100vh; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🚓 시프트 매니저</h1>
        <div id="dDayDisplay" class="d-day-badge">D-Day 계산중</div>
    </div>
    
    <div class="control-panel">
        <div class="input-group">
            <label>1. 목표 D-Day</label>
            <input type="date" id="dDayInput">
        </div>
        <div class="input-group">
            <label>2. 기준 근무 (주기 리셋)</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="baseDate" style="flex: 3;">
                <select id="baseShift" style="flex: 2; padding: 8px 2px;">
                    <option value="0">주간</option>
                    <option value="1">야간</option>
                    <option value="2">비번</option>
                    <option value="3">휴무</option>
                </select>
            </div>
        </div>
        <div class="input-group" style="flex-direction: row; align-items: flex-end; gap: 10px;">
            <div style="flex: 2; display: flex; flex-direction: column; gap: 6px;">
                <label>3. 달력 시작일</label>
                <input type="date" id="targetDate">
            </div>
            <div style="flex: 1;">
                <button id="darkModeToggle" class="btn-toggle">🌙 야간</button>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot bg-work"></div>업무</div>
        <div class="legend-item"><div class="dot bg-free"></div>자유</div>
        <div class="legend-item"><div class="dot bg-sleep-main"></div>정상 수면</div>
        <div class="legend-item"><div class="dot bg-sleep-strat"></div>전략 수면</div>
    </div>

    <!-- ★ 가로 스크롤 없는 풀 와이드 스케줄 보드 -->
    <div class="schedule-board">
        <div class="board-header">
            <div class="board-left">날짜</div>
            <div class="board-right-axis">
                <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
            </div>
        </div>
        <div id="gridContainer">
            <!-- JS 렌더링 영역 -->
        </div>
    </div>

    <div class="memo-panel">
        <label>📝 트리노트 퀵 메모</label>
        <textarea id="quickMemo" placeholder="- [판례] 
  - 핵심 포인트:
- [루틴]
  - 런닝 페이스:"></textarea>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
    }

    /* 커스텀 D-Day 로직 */
    const dDayInput = document.getElementById('dDayInput');
    dDayInput.value = localStorage.getItem('targetDDay') || '2026-08-22';
    dDayInput.addEventListener('change', () => { localStorage.setItem('targetDDay', dDayInput.value); updateDDay(); });

    function updateDDay() {
        if(!dDayInput.value) return;
        const targetDate = new Date(dDayInput.value + 'T00:00:00+09:00');
        const today = new Date();
        today.setHours(0,0,0,0); targetDate.setHours(0,0,0,0);
        
        const diffDays = Math.round((targetDate - today) / (1000 * 60 * 60 * 24));
        const dDayEl = document.getElementById('dDayDisplay');
        
        if (diffDays > 0) dDayEl.innerText = `D-${diffDays}`;
        else if (diffDays === 0) dDayEl.innerText = `D-Day`;
        else { dDayEl.innerText = `D+${Math.abs(diffDays)}`; dDayEl.style.background = '#64748B'; }
    }

    /* 다크 모드 및 메모 로컬 스토리지 로직 */
    const memoEl = document.getElementById('quickMemo');
    const darkModeBtn = document.getElementById('darkModeToggle');
    memoEl.value = localStorage.getItem('treeNoteMemo') || '';
    memoEl.addEventListener('input', () => localStorage.setItem('treeNoteMemo', memoEl.value));

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('isDarkMode', isDark);
        darkModeBtn.innerText = isDark ? '☀️ 주간' : '🌙 야간';
        document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#0F172A' : '#F8FAFC');
    }
    if (localStorage.getItem('isDarkMode') === 'true') toggleDarkMode();
    darkModeBtn.addEventListener('click', toggleDarkMode);

    /* 스케줄러 핵심 마스터 데이터 (1=업무, 2=자유, 3=정상수면, 4=전략수면) */
    const shiftPattern = {
        0: { name: '주간', blocks: Array(48).fill(2) },
        1: { name: '야간', blocks: Array(48).fill(2) },
        2: { name: '비번', blocks: Array(48).fill(2) },
        3: { name: '휴무', blocks: Array(48).fill(2) }
    };
    function fillBlocks(shiftIdx, start, length, type) {
        for(let i = start; i < start + length; i++) shiftPattern[shiftIdx].blocks[i] = type;
    }
    fillBlocks(0, 0, 13, 3); fillBlocks(0, 18, 18, 1); fillBlocks(0, 46, 2, 3);
    fillBlocks(1, 0, 13, 3); fillBlocks(1, 28, 3, 4); fillBlocks(1, 36, 12, 1);
    fillBlocks(2, 0, 18, 1); fillBlocks(2, 20, 8, 4); fillBlocks(2, 46, 2, 3);
    fillBlocks(3, 0, 14, 3); fillBlocks(3, 46, 2, 3);

    const typeMap = { 
        1: {cls: 'bg-work', label:'근무'}, 2: {cls: 'bg-free', label:'자유'}, 
        3: {cls: 'bg-sleep-main', label:'정상 수면'}, 4: {cls: 'bg-sleep-strat', label:'전략 수면'}
    };
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    const elBaseDate = document.getElementById('baseDate');
    const elBaseShift = document.getElementById('baseShift');
    const elTargetDate = document.getElementById('targetDate');
    const elGridContainer = document.getElementById('gridContainer');
    const elTooltip = document.getElementById('tooltip');

    function getSafeDate(dateString) {
        const parts = dateString.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function initScheduler() {
        const todayStr = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        
        elBaseDate.value = localStorage.getItem('shiftBaseDate') || todayStr;
        elBaseShift.value = localStorage.getItem('shiftBaseIndex') || '0';
        elTargetDate.value = localStorage.getItem('shiftTargetDate') || todayStr;

        [elBaseDate, elBaseShift, elTargetDate].forEach(el => { el.addEventListener('change', renderGrid); });

        renderGrid();
        setInterval(renderGrid, 60000); // 1분마다 리렌더링하여 NOW 바 이동
    }

    function renderGrid() {
        localStorage.setItem('shiftBaseDate', elBaseDate.value);
        localStorage.setItem('shiftBaseIndex', elBaseShift.value);
        localStorage.setItem('shiftTargetDate', elTargetDate.value);

        const baseD = getSafeDate(elBaseDate.value);
        const targetD = getSafeDate(elTargetDate.value);
        const baseIndex = parseInt(elBaseShift.value);
        const diffDays = Math.round((targetD - baseD) / (1000 * 60 * 60 * 24));

        // 현재 시간 퍼센트 계산 (NOW 인디케이터용)
        const now = new Date();
        const todayStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        const nowPercent = ((now.getHours() * 60 + now.getMinutes()) / 1440) * 100;

        let html = '';

        for(let i = 0; i < 7; i++) {
            const currentD = new Date(targetD);
            currentD.setDate(targetD.getDate() + i);
            const dateStrId = currentD.toISOString().split('T')[0]; 
            const isToday = (dateStrId === todayStr);
            
            const month = (currentD.getMonth() + 1).toString().padStart(2, '0');
            const date = currentD.getDate().toString().padStart(2, '0');
            const dayStr = dayNames[currentD.getDay()];
            
            const shiftIndex = ((baseIndex + diffDays + i) % 4 + 4) % 4;
            const shiftInfo = shiftPattern[shiftIndex];

            html += `<div class="board-row">`;
            
            // 좌측 요일/근무 (위아래 압축)
            html += `<div class="row-label"><span class="sub">${month}/${date}(${dayStr})</span>${shiftInfo.name}</div>`;
            
            // 우측 풀 와이드 타임라인
            html += `<div class="row-timeline">`;
            
            // 오늘인 경우 실시간 얇은 선 인디케이터 렌더링
            if (isToday) {
                html += `<div class="now-marker" style="left: ${nowPercent}%;"></div>`;
            }

            // 48개 블록 렌더링 (flex: 1로 공간 자동 채움)
            shiftInfo.blocks.forEach((typeCode, blockIndex) => {
                const typeData = typeMap[typeCode];
                const hour = Math.floor(blockIndex / 2).toString().padStart(2, '0');
                const min = (blockIndex % 2 === 0) ? '00' : '30';
                
                html += `<div class="block ${typeData.cls}" 
                              data-time="${hour}:${min}" 
                              data-type="${typeData.label}"
                              onclick="showTooltip(event)"
                              onmouseleave="hideTooltip()"></div>`;
            });
            html += `</div></div>`;
        }
        elGridContainer.innerHTML = html;
    }

    /* 툴팁 중앙 상단 보정 */
    window.showTooltip = function(e) {
        const target = e.target;
        const time = target.getAttribute('data-time');
        const type = target.getAttribute('data-type');
        elTooltip.innerHTML = `<span style="color:#94A3B8;">${time}</span><br/>${type}`;
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        elTooltip.style.left = clientX + 'px';
        elTooltip.style.top = (clientY - 35) + 'px';
        elTooltip.style.transform = 'translate(-50%, 0)'; 
        elTooltip.style.opacity = '1';
        
        if (window.innerWidth <= 768) { setTimeout(hideTooltip, 1500); }
    };
    window.hideTooltip = function() { elTooltip.style.opacity = '0'; };

    updateDDay();
    initScheduler();
</script>

</body>
</html>
