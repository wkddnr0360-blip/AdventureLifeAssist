<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 메타 태그 연동 -->
    <meta name="theme-color" content="#F8FAFC" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>주야비휴 라이프 어시스트</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-main: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-panel: #F1F5F9;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --input-bg: #FFFFFF;
            
            /* 스케줄 컬러 팔레트 */
            --work-bg: #1E3A8A; /* 짙은 네이비 */
            --free-bg: #DBEAFE; /* 연한 아이스블루 */
            --sleep-main: #7C3AED; /* 딥 퍼플 */
            --sleep-strat: #C4B5FD; /* 라이트 퍼플 */
        }

        /* 다크 모드 변수 */
        body.dark-mode {
            --bg-main: #0F172A;
            --bg-card: #1E293B;
            --bg-panel: #334155;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --border: #475569;
            --input-bg: #1E293B;
            
            --work-bg: #3B82F6;
            --free-bg: #1E3A8A;
            --sleep-main: #A78BFA;
            --sleep-strat: #6D28D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Pretendard", -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; justify-content: center;
            padding: 30px 15px;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            width: 100%; max-width: 1050px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            padding: 30px;
            transition: background-color 0.3s;
        }

        /* 헤더 & D-Day */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;}
        .d-day-badge {
            background: #EF4444; color: white; padding: 6px 14px;
            border-radius: 20px; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* 컨트롤 패널 */
        .control-panel {
            display: flex; flex-wrap: wrap; gap: 15px;
            background: var(--bg-panel); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 180px; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--text-sub); }
        input, select, button {
            padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 14px; outline: none;
            background: var(--input-bg); color: var(--text-main);
            transition: all 0.2s;
        }
        input:focus, select:focus { border-color: #3B82F6; }
        
        .btn-toggle {
            background: transparent; border: 1px solid var(--border); cursor: pointer;
            padding: 10px 15px; border-radius: 8px; font-weight: 600; color: var(--text-main);
        }
        .btn-toggle:hover { background: var(--border); }

        /* 단백질 트래커 */
        .tracker-panel {
            background: var(--bg-panel); padding: 15px 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tracker-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .progress-bar-bg { width: 100%; height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .progress-bar-fill { height: 100%; background: #3B82F6; width: 0%; transition: width 0.3s ease; }
        .tracker-controls { display: flex; gap: 10px; align-items: center; }
        .btn-add { background: #3B82F6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        /* 범례 */
        .legend {
            display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
            margin-bottom: 20px; font-size: 13px; font-weight: 600; color: var(--text-main);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }
        
        .bg-work { background-color: var(--work-bg); }
        .bg-free { background-color: var(--free-bg); }
        .bg-sleep-main { background-color: var(--sleep-main); }
        .bg-sleep-strat { background-color: var(--sleep-strat); }

        /* 그리드 뷰 */
        .grid-wrapper {
            width: 100%; overflow-x: auto; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            margin-bottom: 25px;
        }
        .time-grid {
            display: inline-grid;
            grid-template-columns: 130px repeat(48, minmax(18px, 1fr));
            min-width: max-content; border-bottom: 1px solid var(--border);
        }
        .time-grid:last-child { border-bottom: none; }
        .header-row { background: var(--bg-panel); position: sticky; top: 0; z-index: 5; }
        
        .cell { padding: 8px 0; text-align: center; font-size: 11px; color: var(--text-sub); border-right: 1px dashed var(--border); }
        .cell.time-header { grid-column: span 2; border-right: 1px solid var(--border); font-weight: 700; }
        
        /* 좌측 요일 고정 & 밀림 방지 */
        .date-label {
            position: sticky; left: 0; background: var(--bg-card); padding: 0 15px;
            font-size: 13px; font-weight: 700; color: var(--text-main);
            border-right: 2px solid var(--border); z-index: 10;
            white-space: nowrap; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .header-row .date-label { background: var(--bg-panel); z-index: 15; }

        .block { height: 100%; transition: opacity 0.2s; cursor: pointer; border-right: 1px solid rgba(0,0,0,0.02); }
        .block:hover { opacity: 0.7; }
        
        .current-time-block {
            position: relative; background-color: #EF4444 !important; z-index: 20; transform: scaleY(1.1);
        }
        .current-time-block::before {
            content: 'NOW'; position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            background: #EF4444; color: white; font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 12px; z-index: 25;
        }

        /* 트리노트 퀵 메모 */
        .memo-panel {
            background: var(--bg-panel); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .memo-panel label { display: block; font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        textarea {
            width: 100%; height: 120px; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--input-bg);
            color: var(--text-main); font-family: inherit; font-size: 14px;
            resize: vertical; outline: none; line-height: 1.5;
        }
        textarea:focus { border-color: #3B82F6; }

        /* 툴팁 */
        .tooltip {
            position: fixed; background: #0F172A; color: #FFFFFF; padding: 6px 10px;
            border-radius: 6px; font-size: 12px; font-weight: 600; pointer-events: none;
            opacity: 0; transform: translateY(5px); transition: all 0.2s; z-index: 999;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🚓 Adventure Life Assist</h1>
        <div id="dDayDisplay" class="d-day-badge">D-Day 계산중...</div>
    </div>
    
    <div class="control-panel">
        <div class="input-group">
            <label>기준 근무 설정 (주기 리셋용)</label>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="baseDate" style="flex: 1;">
                <select id="baseShift" style="flex: 1;">
                    <option value="0">주간 근무</option>
                    <option value="1">야간 근무</option>
                    <option value="2">비번 (퇴근)</option>
                    <option value="3">휴무 (휴식)</option>
                </select>
            </div>
        </div>
        <div class="input-group" style="max-width: 180px;">
            <label>달력 조회 시작일</label>
            <input type="date" id="targetDate">
        </div>
        <div class="input-group" style="max-width: 120px; justify-content: flex-end;">
            <button id="darkModeToggle" class="btn-toggle">🌙 야간 모드</button>
        </div>
    </div>

    <!-- 단백질 트래커 (목표 160g) -->
    <div class="tracker-panel">
        <div class="tracker-header">
            <span class="tracker-title">💪 일일 영양 트래커 (목표: 160g)</span>
            <span id="proteinText" style="font-weight: 800; font-size: 14px; color: #3B82F6;">0g / 160g</span>
        </div>
        <div class="progress-bar-bg">
            <div id="proteinBar" class="progress-bar-fill"></div>
        </div>
        <div class="tracker-controls">
            <button class="btn-add" onclick="addProtein(20)">+ 20g (닭가슴살)</button>
            <button class="btn-add" onclick="addProtein(30)">+ 30g (쉐이크)</button>
            <button class="btn-toggle" style="padding: 6px 12px; margin-left: auto;" onclick="resetProtein()">초기화</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot bg-work"></div>업무 시간 (집중)</div>
        <div class="legend-item"><div class="dot bg-free"></div>자유 시간 (운동/여가)</div>
        <div class="legend-item"><div class="dot bg-sleep-main"></div>메인 수면 (밤잠)</div>
        <div class="legend-item"><div class="dot bg-sleep-strat"></div>전략 수면 (낮잠/앵커)</div>
    </div>

    <div class="grid-wrapper" id="gridContainer"></div>

    <!-- 트리노트 방식 메모장 -->
    <div class="memo-panel">
        <label>📝 트리노트 퀵 메모 (자동 저장)</label>
        <textarea id="quickMemo" placeholder="- [판례] 
  - 핵심 포인트:
  - 예외 지문:
- [루틴]
  - 런닝 페이스:"></textarea>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
    /* 1. PWA Service Worker Registration */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered!', reg))
                .catch(err => console.log('Service Worker Registration Failed:', err));
        });
    }

    /* 2. D-Day 로직 (2026-08-22) */
    function updateDDay() {
        const examDate = new Date('2026-08-22T00:00:00+09:00');
        const today = new Date();
        const diffTime = examDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        const dDayEl = document.getElementById('dDayDisplay');
        if (diffDays > 0) {
            dDayEl.innerText = `경찰 채용 D-${diffDays}`;
        } else if (diffDays === 0) {
            dDayEl.innerText = `결전의 날 (D-Day)`;
        } else {
            dDayEl.innerText = `시험 종료 (D+${Math.abs(diffDays)})`;
            dDayEl.style.background = '#64748B';
        }
    }

    /* 3. 단백질 트래커 로직 */
    let currentProtein = 0;
    const proteinTarget = 160;
    const getTodayKey = () => `protein_${new Date().toISOString().split('T')[0]}`;

    function loadProtein() {
        currentProtein = parseInt(localStorage.getItem(getTodayKey())) || 0;
        renderProtein();
    }
    
    function addProtein(amount) {
        currentProtein += amount;
        localStorage.setItem(getTodayKey(), currentProtein);
        renderProtein();
    }
    
    function resetProtein() {
        currentProtein = 0;
        localStorage.setItem(getTodayKey(), currentProtein);
        renderProtein();
    }
    
    function renderProtein() {
        const percent = Math.min((currentProtein / proteinTarget) * 100, 100);
        document.getElementById('proteinBar').style.width = `${percent}%`;
        document.getElementById('proteinText').innerText = `${currentProtein}g / ${proteinTarget}g`;
        if (percent >= 100) {
            document.getElementById('proteinBar').style.background = '#10B981'; // 완료 시 초록색
        } else {
            document.getElementById('proteinBar').style.background = '#3B82F6';
        }
    }

    /* 4. 다크 모드 및 메모 로컬 스토리지 로직 */
    const memoEl = document.getElementById('quickMemo');
    const darkModeBtn = document.getElementById('darkModeToggle');
    
    memoEl.value = localStorage.getItem('treeNoteMemo') || '';
    memoEl.addEventListener('input', () => localStorage.setItem('treeNoteMemo', memoEl.value));

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('isDarkMode', isDark);
        darkModeBtn.innerText = isDark ? '☀️ 주간 모드' : '🌙 야간 모드';
        document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#0F172A' : '#F8FAFC');
    }
    if (localStorage.getItem('isDarkMode') === 'true') {
        toggleDarkMode();
    }
    darkModeBtn.addEventListener('click', toggleDarkMode);

    /* 5. 스케줄러 핵심 로직 (1=업무, 2=자유, 3=정상수면, 4=전략수면) */
    const shiftPattern = {
        0: { name: '주간', blocks: Array(48).fill(2) },
        1: { name: '야간', blocks: Array(48).fill(2) },
        2: { name: '비번', blocks: Array(48).fill(2) },
        3: { name: '휴무', blocks: Array(48).fill(2) }
    };
    function fillBlocks(shiftIdx, start, length, type) {
        for(let i = start; i < start + length; i++) shiftPattern[shiftIdx].blocks[i] = type;
    }
    
    fillBlocks(0, 0, 13, 3); fillBlocks(0, 18, 18, 1); fillBlocks(0, 46, 2, 3);
    fillBlocks(1, 0, 13, 3); fillBlocks(1, 28, 3, 4); fillBlocks(1, 36, 12, 1);
    fillBlocks(2, 0, 18, 1); fillBlocks(2, 20, 8, 4); fillBlocks(2, 46, 2, 3);
    fillBlocks(3, 0, 14, 3); fillBlocks(3, 46, 2, 3);

    const typeMap = { 
        1: {cls: 'bg-work', label:'근무 중'}, 2: {cls: 'bg-free', label:'자유 시간'}, 
        3: {cls: 'bg-sleep-main', label:'정상 수면'}, 4: {cls: 'bg-sleep-strat', label:'전략적 수면'}
    };
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    const elBaseDate = document.getElementById('baseDate');
    const elBaseShift = document.getElementById('baseShift');
    const elTargetDate = document.getElementById('targetDate');
    const elGridContainer = document.getElementById('gridContainer');
    const elTooltip = document.getElementById('tooltip');

    function getSafeDate(dateString) {
        const parts = dateString.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function initScheduler() {
        const todayStr = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        
        elBaseDate.value = localStorage.getItem('shiftBaseDate') || todayStr;
        elBaseShift.value = localStorage.getItem('shiftBaseIndex') || '0';
        elTargetDate.value = localStorage.getItem('shiftTargetDate') || todayStr;

        [elBaseDate, elBaseShift, elTargetDate].forEach(el => {
            el.addEventListener('change', renderGrid);
        });

        renderGrid();
        setInterval(markCurrentTime, 60000); 
    }

    function renderGrid() {
        localStorage.setItem('shiftBaseDate', elBaseDate.value);
        localStorage.setItem('shiftBaseIndex', elBaseShift.value);
        localStorage.setItem('shiftTargetDate', elTargetDate.value);

        const baseD = getSafeDate(elBaseDate.value);
        const targetD = getSafeDate(elTargetDate.value);
        const baseIndex = parseInt(elBaseShift.value);
        const diffDays = Math.round((targetD - baseD) / (1000 * 60 * 60 * 24));

        let html = '';
        html += '<div class="time-grid header-row"><div class="date-label">근무일자</div>';
        for(let i = 0; i < 24; i++) html += `<div class="cell time-header">${i.toString().padStart(2, '0')}</div>`;
        html += '</div>';

        for(let i = 0; i < 7; i++) {
            const currentD = new Date(targetD);
            currentD.setDate(targetD.getDate() + i);
            const dateStrId = currentD.toISOString().split('T')[0]; 
            
            const month = (currentD.getMonth() + 1).toString().padStart(2, '0');
            const date = currentD.getDate().toString().padStart(2, '0');
            const dayStr = dayNames[currentD.getDay()];
            
            const shiftIndex = ((baseIndex + diffDays + i) % 4 + 4) % 4;
            const shiftInfo = shiftPattern[shiftIndex];

            html += `<div class="time-grid" id="row-${dateStrId}">`;
            html += `<div class="date-label">${month}/${date}(${dayStr}) ${shiftInfo.name}</div>`;
            
            shiftInfo.blocks.forEach((typeCode, blockIndex) => {
                const typeData = typeMap[typeCode];
                const hour = Math.floor(blockIndex / 2).toString().padStart(2, '0');
                const min = (blockIndex % 2 === 0) ? '00' : '30';
                
                html += `<div class="block ${typeData.cls}" 
                              id="block-${dateStrId}-${blockIndex}"
                              data-time="${hour}:${min}" 
                              data-type="${typeData.label}"
                              onmouseenter="showTooltip(event)" 
                              ontouchstart="showTooltip(event)"
                              onmouseleave="hideTooltip()"
                              ontouchend="hideTooltip()"></div>`;
            });
            html += `</div>`;
        }
        elGridContainer.innerHTML = html;
        markCurrentTime(); 
    }

    function markCurrentTime() {
        document.querySelectorAll('.current-time-block').forEach(el => el.classList.remove('current-time-block'));
        
        const now = new Date();
        const todayStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        const blockIndex = (now.getHours() * 2) + (now.getMinutes() >= 30 ? 1 : 0);
        
        const targetBlock = document.getElementById(`block-${todayStr}-${blockIndex}`);
        
        if(targetBlock) {
            targetBlock.classList.add('current-time-block');
        }
    }

    // 툴팁 로직
    window.showTooltip = function(e) {
        const target = e.target || e.touches[0].target;
        const time = target.getAttribute('data-time');
        const type = target.getAttribute('data-type');
        elTooltip.innerHTML = `<strong>${time}</strong><br/>${type}`;
        elTooltip.style.opacity = '1';
        elTooltip.style.transform = 'translateY(0)';
        
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        elTooltip.style.left = (clientX + 15) + 'px';
        elTooltip.style.top = (clientY + 15) + 'px';
    };
    window.hideTooltip = function() {
        elTooltip.style.opacity = '0';
        elTooltip.style.transform = 'translateY(5px)';
    };

    // 앱 초기화 실행
    updateDDay();
    loadProtein();
    initScheduler();
</script>

</body>
</html>
