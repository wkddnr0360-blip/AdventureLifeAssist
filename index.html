<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Journey's End - Master Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#88B2CC">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Journey">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<div class="app-container">
    <header class="header" id="globalHeader">
        <h1>JOURNEY'S END</h1>
        <div class="header-controls">
            <span class="logical-date" id="headerDate"></span>
            <div class="avatar-btn" id="btnOpenProfile"><i class="fa-solid fa-user" id="headerAvatarIcon"></i></div>
        </div>
    </header>

    <main id="viewQuest" class="view-section active">
        <div id="map-container"><div id="questMap"></div></div>
        <div class="map-btn btn-cloak" id="btnCloak"><i class="fa-solid fa-ghost"></i></div>
        <div class="map-btn btn-locate" id="btnLocate"><i class="fa-solid fa-location-crosshairs"></i></div>
        
        <div class="quest-bottom-panel">
            <div class="timer-val" id="stopwatch">00:00:00</div>
            <div class="action-row">
                <button class="btn-study" id="btnStudyToggle"><i class="fa-solid fa-book-journal-whills"></i> <span>마법 탐구 시작</span></button>
                <button class="btn-record" id="btnOpenEvents"><i class="fa-solid fa-feather-pointed"></i> <span>기억 새기기</span></button>
            </div>
        </div>
    </main>

    <main id="viewLog" class="view-section">
        <div class="stats-board">
            <div class="stat-box"><div class="stat-label">오늘의 탐구</div><div class="stat-val" id="stDay">0분</div></div>
            <div class="stat-box"><div class="stat-label">이번 주</div><div class="stat-val" id="stWeek">0분</div></div>
            <div class="stat-box"><div class="stat-label">이번 달</div><div class="stat-val" id="stMonth">0분</div></div>
        </div>
        <div class="ui-input-row memo-bar">
            <input type="text" id="quickMemo" placeholder="✍️ 단상을 가볍게 남겨보세요...">
            <button class="btn-submit gold" id="btnSaveMemo"><i class="fa-solid fa-pen-nib"></i></button>
        </div>
        <div id="logStream"></div>
    </main>

    <main id="viewJournal" class="view-section">
        <div class="calendar-card">
            <div class="cal-header">
                <button id="btnPrevMonth" style="background:none; border:none; cursor:pointer; color:var(--text-dim);"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="calMonthTitle"></span>
                <button id="btnNextMonth" style="background:none; border:none; cursor:pointer; color:var(--text-dim);"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
        </div>
        <h3 style="font-size: 16px; color: var(--gold); margin-bottom: 15px; margin-top:0;" id="journalDateTitle">날짜 선택</h3>
        <div id="journalLogList"></div>
    </main>

    <main id="viewTavern" class="view-section">
        <div class="dm-header"><h2>모험가 길드 주점</h2></div>
        <div class="dm-tabs">
            <div class="dm-tab active" data-target="secGlobal">전체 채팅</div>
            <div class="dm-tab" data-target="secSelf">나와의 DM</div>
            <div class="dm-tab" data-target="secQuest">셀프 퀘스트</div>
        </div>
        
        <div class="tavern-section active" id="secGlobal">
            <div class="chat-stream" id="chatStreamGlobal"></div>
            <div class="chat-input-area">
                <div class="ui-input-row">
                    <input type="text" id="chatInputGlobal" placeholder="모험가들에게 인사하기...">
                    <button class="btn-submit" id="btnSendGlobal">보내기</button>
                </div>
            </div>
        </div>

        <div class="tavern-section" id="secSelf">
            <div class="chat-stream" id="chatStreamSelf" style="background:#f9f9f9;"></div>
            <div class="chat-input-area">
                <div class="ui-input-row">
                    <input type="file" id="selfImageUpload" accept="image/*" style="display:none;">
                    <label for="selfImageUpload" class="icon-btn" style="cursor:pointer;"><i class="fa-solid fa-camera"></i></label>
                    <input type="text" id="chatInputSelf" placeholder="나에게 메모 남기기...">
                    <button class="btn-submit" id="btnSendSelf">저장</button>
                </div>
            </div>
        </div>

        <div class="tavern-section" id="secQuest">
            <div class="quest-board">
                <div class="ui-input-row" style="margin-bottom: 20px;">
                    <input type="text" id="questInput" placeholder="새로운 루틴/퀘스트 추가">
                    <button class="btn-submit" id="btnAddQuest">추가</button>
                </div>
                <div id="questList"></div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-view="viewQuest"><i class="fa-solid fa-house"></i><span>여정</span></div>
        <div class="nav-item" data-view="viewLog"><i class="fa-solid fa-magnifying-glass"></i><span>발자취</span></div>
        <div class="nav-item" data-view="viewJournal"><i class="fa-regular fa-calendar-days"></i><span>마도서</span></div>
        <div class="nav-item" data-view="viewTavern"><i class="fa-regular fa-paper-plane"></i><span>주점(DM)</span></div>
    </nav>
</div>

<div class="modal-overlay bottom-sheet" id="eventModal">
    <div class="modal-content">
        <h3 class="modal-title">작업 선택</h3>
        <div class="event-grid">
            <div class="event-item evt-opt" data-type="아침 맞이" data-icon="fa-solid fa-sun"><i class="fa-solid fa-sun"></i><div>아침 맞이</div></div>
            <div class="event-item evt-opt" data-type="식사" data-icon="fa-solid fa-utensils"><i class="fa-solid fa-utensils"></i><div>식사/휴식</div></div>
            <div class="event-item evt-opt" data-type="단련" data-icon="fa-solid fa-dumbbell"><i class="fa-solid fa-dumbbell"></i><div>체력 단련</div></div>
            <div class="event-item evt-opt" data-type="탐구" data-icon="fa-solid fa-wand-magic-sparkles"><i class="fa-solid fa-wand-magic-sparkles"></i><div>마법 탐구</div></div>
            <div class="event-item evt-opt" data-type="수면" data-icon="fa-solid fa-moon"><i class="fa-solid fa-moon"></i><div>야영/수면</div></div>
            <div class="event-item evt-opt" data-type="여정" data-icon="fa-solid fa-route"><i class="fa-solid fa-route"></i><div>이동/기타</div></div>
        </div>
        <div id="eventInputs" style="display:none; flex-direction:column; gap:10px;">
            <div class="ui-input-row"><input type="text" id="inputAction" placeholder="구체적인 내용 (예: 새로운 숲 탐험)"></div>
            <div class="ui-input-row"><input type="text" id="inputPlace" placeholder="장소명 (예: 요정의 숲)"></div>
            <button class="ui-input-row btn-submit" style="width:100%; justify-content:center; margin-top:5px; border-radius:16px;" id="btnSaveEvent">기록 남기기</button>
        </div>
    </div>
</div>

<div class="modal-overlay center-popup" id="profileModal">
    <div class="modal-content">
        <h3 class="modal-title">내 정보 및 연동</h3>
        
        <div id="loginSection" style="text-align: center; margin-bottom: 20px;">
            <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 10px;">여정을 안전하게 기록하기 위해 로그인하세요.</p>
            <div class="ui-input-row" style="margin-bottom: 10px;">
                <input type="email" id="loginEmail" placeholder="이메일">
            </div>
            <div class="ui-input-row" style="margin-bottom: 10px;">
                <input type="password" id="loginPassword" placeholder="비밀번호">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btnLogin" style="flex: 1; padding: 14px 0; border-radius: 16px; border: none; font-size: 15px; font-weight: 800; color: #fff; background: var(--primary); cursor: pointer; box-shadow: var(--shadow-md);">로그인</button>
                <button id="btnSignup" style="flex: 1; padding: 14px 0; border-radius: 16px; border: 1.5px solid var(--primary); font-size: 15px; font-weight: 800; color: var(--primary); background: #fff; cursor: pointer;">회원가입</button>
            </div>
            <button id="btnGoogleLogin" style="width: 100%; padding: 14px 0; border-radius: 16px; border: 1px solid #DBDBDB; font-size: 15px; font-weight: 800; color: var(--text); background: #fff; cursor: pointer; margin-top: 10px; box-shadow: var(--shadow-sm); display: flex; justify-content: center; align-items: center;">
                <i class="fa-brands fa-google" style="margin-right: 8px;"></i> 구글로 로그인
            </button>
        </div>

        <div id="userInfoSection" style="display: none;">
            <p style="text-align: center; margin-bottom: 10px; color: var(--gold); font-weight: bold;">환영합니다, <span id="userNameDisplay"></span>님!</p>
            <div class="profile-avatar-wrap">
                <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                <label for="avatarUpload" class="profile-avatar-lrg" id="profileAvatarUI">
                    <i class="fa-solid fa-camera" id="profileModalIcon"></i>
                </label>
            </div>
            <button id="btnResetAvatar" style="display:block; margin: 0 auto 15px auto; background:none; border:none; text-decoration:underline; color:var(--danger); font-size:12px; cursor:pointer;">기본 아바타로 변경</button>
            <div class="ui-input-row" style="margin-bottom:10px;"><input type="text" id="profileNameInput" placeholder="모험가 이름" maxlength="12"></div>
            <button class="ui-input-row btn-submit" style="width:100%; justify-content:center; background:var(--primary); margin-bottom: 10px;" id="btnSaveProfile">정보 갱신</button>
            
            <button id="btnLogout" class="btn-submit" style="width: 100%; justify-content: center; background: var(--surface); color: var(--text); border: 1px solid var(--border);">로그아웃</button>
        </div>
        
        <div class="sync-box" style="margin-top: 20px;">
            <label>기기 연동 고유 코드 (구버전 호환용)</label>
            <div class="code-display" id="syncCodeDisplay"></div>
            <div class="ui-input-row">
                <input type="text" id="syncCodeInput" placeholder="기존 연동 코드 붙여넣기">
                <button class="btn-submit" id="btnApplySync">불러오기</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay bottom-sheet" id="userJourneyModal">
    <div class="modal-content">
        <h3 class="modal-title" id="userJourneyTitle">모험가의 오늘 여정</h3>
        <div id="userJourneyLog"></div>
        <button class="ui-input-row btn-submit" style="width:100%; justify-content:center; background:#fff; color:var(--text); border:1px solid #DBDBDB;" id="btnCloseJourney">닫기</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('ServiceWorker 등록 성공:', reg.scope))
                .catch(err => console.error('ServiceWorker 등록 실패:', err));
        });
    }
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
