<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F8FAFC" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Life Assist Pro</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-main: #F8FAFC; --bg-card: #FFFFFF; --bg-panel: #F1F5F9;
            --text-main: #1E293B; --text-sub: #64748B; --border: #E2E8F0;
            --input-bg: #FFFFFF; --nav-bg: #FFFFFF;
            
            --work-bg: #1E3A8A; --free-bg: #DBEAFE; 
            --sleep-main: #7C3AED; --sleep-strat: #C4B5FD;
        }

        body.dark-mode {
            --bg-main: #0F172A; --bg-card: #1E293B; --bg-panel: #334155;
            --text-main: #F8FAFC; --text-sub: #94A3B8; --border: #475569;
            --input-bg: #0F172A; --nav-bg: #1E293B;
            
            --work-bg: #3B82F6; --free-bg: #1E3A8A; 
            --sleep-main: #A78BFA; --sleep-strat: #6D28D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Pretendard", -apple-system, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            display: flex; justify-content: center;
            padding-bottom: 70px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container { width: 100%; max-width: 900px; padding: 20px 15px; }

        .card { background: var(--bg-card); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;}
        .title-row h2 { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-sub); }
        input, select, button { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; background: var(--input-bg); color: var(--text-main); transition: border-color 0.2s;}
        input:focus, select:focus { border-color: #3B82F6; }
        
        .btn-primary { background: #3B82F6; color: white; border: none; font-weight: 700; cursor: pointer; padding: 10px 16px; flex-shrink: 0; white-space: nowrap; }
        .btn-toggle { background: transparent; border: 1px solid var(--border); cursor: pointer; font-weight: 600; width: 100%; }

        .d-day-badge { background: #EF4444; color: white; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 13px; }

        textarea { width: 100%; height: 160px; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 14px; resize: vertical; outline: none; line-height: 1.6; }

        /* 하단 네비게이션 탭 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: var(--nav-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-sub); font-size: 11px; font-weight: 700; cursor: pointer; transition: color 0.2s;
        }
        .nav-item.active { color: #3B82F6; }
        .nav-icon { font-size: 20px; }

        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* [오늘 하루] 플래너 */
        .daily-list { display: flex; flex-direction: column; gap: 6px; }
        .daily-row {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg-panel); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
        }
        .time-badge { width: 40px; font-size: 11px; font-weight: 800; color: var(--text-sub); text-align: center; }
        .type-select { width: 70px; padding: 6px 4px; font-size: 11px; font-weight: 800; border: none; border-radius: 6px; text-align: center;}
        
        .t-1 { background-color: var(--work-bg); color: white; }
        .t-2 { background-color: var(--free-bg); color: var(--work-bg); }
        .t-3 { background-color: var(--sleep-main); color: white; }
        .t-4 { background-color: var(--sleep-strat); color: #4C1D95; }

        .note-input { flex: 1; border: none; background: transparent; border-bottom: 1px solid var(--border); border-radius: 0; padding: 4px; font-size: 13px; min-width: 0;}
        .note-input:focus { border-bottom: 1px solid #3B82F6; }

        /* [일주일 전체] 와이드 보드 모바일 최적화 */
        .schedule-board { width: 100%; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--bg-card); margin-bottom: 15px;}
        .board-header { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); }
        .board-left { width: 65px; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: 700; color: var(--text-sub); border-right: 1px solid var(--border); padding: 8px 0; }
        .board-right-axis { flex-grow: 1; display: flex; justify-content: space-between; padding: 8px 5px; font-size: 10px; font-weight: 700; color: var(--text-sub); }
        .board-row { display: flex; height: 50px; border-bottom: 1px solid var(--border); position: relative; }
        .board-row:last-child { border-bottom: none; }
        .row-label { width: 65px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-card); border-right: 1px solid var(--border); font-size: 11px; font-weight: 800; }
        .row-label span.sub { font-size: 9px; color: var(--text-sub); font-weight: 600; margin-bottom: 2px; }
        
        .row-timeline { flex-grow: 1; display: flex; position: relative; background: var(--bg-card); }
        
        /* 모바일 최적화: 개별 칸 테두리 없애고 6시간 단위(12칸)로만 구분선 추가 */
        .block { flex: 1; height: 100%; cursor: pointer; transition: filter 0.2s;}
        .block:nth-child(12n) { border-right: 1px solid rgba(0,0,0,0.1); } 
        .block:active { filter: brightness(0.7); }
        .bg-work { background-color: var(--work-bg) !important; }
        .bg-free { background-color: var(--free-bg) !important; }
        .bg-sleep-main { background-color: var(--sleep-main) !important; }
        .bg-sleep-strat { background-color: var(--sleep-strat) !important; }
        
        .now-marker { position: absolute; top: 0; bottom: 0; width: 2px; background-color: #EF4444; z-index: 10; box-shadow: 0 0 4px rgba(239, 68, 68, 0.5); pointer-events: none; }
        .now-marker::after { content: 'NOW'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: #EF4444; color: white; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: 800; }
        
        .sync-status { font-size: 12px; font-weight: 800; color: #10B981; display: none; align-items: center; gap: 6px; margin-top: 5px;}

        /* 일주일 달력 툴팁 */
        .tooltip {
            position: fixed; background: #0F172A; color: #FFFFFF; padding: 8px 12px;
            border-radius: 8px; font-size: 12px; font-weight: 600; pointer-events: none;
            opacity: 0; transition: opacity 0.15s; z-index: 999; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); line-height: 1.4;
        }
        .tooltip-note { color: #FBBF24; margin-top: 4px; font-size: 11px; display: block;}
    </style>
</head>
<body>

<div class="app-container">

    <div id="tab-home" class="tab-content active">
        <div class="card">
            <div class="title-row">
                <h2>🏠 메인 설정</h2>
                <div id="dDayDisplay" class="d-day-badge">D-Day 계산중</div>
            </div>
            
            <div class="input-group">
                <label>🔥 내 기기 고유 코드 (다른 기기 연동시 입력)</label>
                <div style="display: flex; gap: 8px; align-items: stretch; width: 100%;">
                    <input type="text" id="userCode" placeholder="코드 로딩중..." style="flex: 1; min-width: 0; text-transform: uppercase; font-weight: 800; color: #3B82F6; letter-spacing: 2px; text-align: center;">
                    <button class="btn-primary" id="btnSync">연동하기</button>
                </div>
                <div id="syncIndicator" class="sync-status">🟢 실시간 클라우드 동기화 중</div>
                <p style="font-size: 11px; color: var(--text-sub); margin-top: 4px;">※ 태블릿이나 PC에서 위 코드를 입력하면 일정이 즉시 연동됩니다.</p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <div class="input-group" style="flex: 1;">
                    <label>기준 날짜 (주기 세팅)</label>
                    <input type="date" id="baseDate">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>기준 근무</label>
                    <select id="baseShift">
                        <option value="0">주간 근무</option>
                        <option value="1">야간 근무</option>
                        <option value="2">비번 (퇴근)</option>
                        <option value="3">휴무 (휴식)</option>
                    </select>
                </div>
            </div>

            <button id="darkModeToggle" class="btn-toggle" style="margin-top: 15px;">🌙 야간 모드 전환</button>
        </div>

        <div class="card">
            <div class="title-row"><h2>📝 트리노트 퀵 메모 (자동저장)</h2></div>
            <textarea id="quickMemo" placeholder="자유롭게 메모를 작성하세요..."></textarea>
        </div>
    </div>

    <div id="tab-today" class="tab-content">
        <div class="card" style="padding: 15px;">
            <div class="title-row" style="margin-bottom: 5px;">
                <h2>📝 일일 커스텀 플래너</h2>
                <span id="todayShiftBadge" class="d-day-badge" style="background:#3B82F6;">오늘 근무 로딩중</span>
            </div>
            <p style="font-size:11px; color:var(--text-sub); margin-bottom: 15px; font-weight: 600;">※ 수면/기상 시간 등 구간 변동사항을 직접 수정하고 기록하세요.</p>
            
            <div class="daily-list" id="dailyListContainer">
                </div>
        </div>
    </div>

    <div id="tab-weekly" class="tab-content">
        <div class="card" style="padding: 15px;">
            <div class="title-row" style="margin-bottom: 15px;">
                <h2>📅 전체 일주일 기록</h2>
                <input type="date" id="targetDate" style="padding: 6px 8px; font-size: 13px; border:1px solid var(--border); background:var(--bg-panel); font-weight:700; border-radius: 8px;">
            </div>
            
            <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 15px; font-size: 11px; font-weight: 700;">
                <span style="color:var(--text-main);"><span style="display:inline-block; width:12px; height:12px; background:var(--work-bg); border-radius:3px; vertical-align:-2px; margin-right: 2px;"></span> 업무</span>
                <span style="color:var(--text-main);"><span style="display:inline-block; width:12px; height:12px; background:var(--free-bg); border-radius:3px; vertical-align:-2px; margin-right: 2px;"></span> 자유</span>
                <span style="color:var(--text-main);"><span style="display:inline-block; width:12px; height:12px; background:var(--sleep-main); border-radius:3px; vertical-align:-2px; margin-right: 2px;"></span> 수면</span>
                <span style="color:var(--text-main);"><span style="display:inline-block; width:12px; height:12px; background:var(--sleep-strat); border-radius:3px; vertical-align:-2px; margin-right: 2px;"></span> 전략</span>
            </div>

            <div class="schedule-board">
                <div class="board-header">
                    <div class="board-left">날짜</div>
                    <div class="board-right-axis"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>
                </div>
                <div id="gridContainer"></div>
            </div>
            <p style="font-size:11px; color:var(--text-sub); text-align: center; font-weight: 600;">※ 달력의 블록을 누르면 일일 플래너에 적은 메모가 표시됩니다.</p>
        </div>
    </div>

</div>

<nav class="bottom-nav">
    <div class="nav-item active" data-tab="tab-home">
        <span class="nav-icon">🏠</span><span>홈 설정</span>
    </div>
    <div class="nav-item" data-tab="tab-today">
        <span class="nav-icon">📝</span><span>오늘 플래너</span>
    </div>
    <div class="nav-item" data-tab="tab-weekly">
        <span class="nav-icon">📅</span><span>일주일 기록</span>
    </div>
</nav>

<div class="tooltip" id="tooltip"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2FQGM7RGVjFQ7fxddIiAN5O7A0bF_omM",
      authDomain: "reader2-43b34.firebaseapp.com",
      projectId: "reader2-43b34",
      storageBucket: "reader2-43b34.firebasestorage.app",
      messagingSenderId: "909397198375",
      appId: "1:909397198375:web:bd21eb8f3731b545af7002",
      measurementId: "G-K2RR68SPZV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function getLocalDateString(dateObj) {
        const offset = dateObj.getTimezoneOffset() * 60000;
        return (new Date(dateObj.getTime() - offset)).toISOString().slice(0, 10);
    }

    let appState = {
        baseDate: getLocalDateString(new Date()),
        baseShift: "0",
        memo: "",
        dailyData: {} 
    };
    let activeUserCode = "";
    let unsubscribe = null; 

    const els = {
        baseDate: document.getElementById('baseDate'),
        baseShift: document.getElementById('baseShift'),
        targetDate: document.getElementById('targetDate'),
        memo: document.getElementById('quickMemo'),
        userCode: document.getElementById('userCode'),
        btnSync: document.getElementById('btnSync'),
        syncIndicator: document.getElementById('syncIndicator'),
        dailyList: document.getElementById('dailyListContainer'),
        grid: document.getElementById('gridContainer'),
        todayBadge: document.getElementById('todayShiftBadge')
    };

    const shiftPattern = {
        0: { name: '주간', blocks: [] },
        1: { name: '야간', blocks: [] },
        2: { name: '비번', blocks: [] },
        3: { name: '휴무', blocks: [] }
    };
    
    for(let s=0; s<4; s++) { for(let i=0; i<48; i++) shiftPattern[s].blocks.push(2); }
    
    for(let i=0; i<13; i++) shiftPattern[0].blocks[i] = 3;
    for(let i=18; i<36; i++) shiftPattern[0].blocks[i] = 1;
    for(let i=46; i<48; i++) shiftPattern[0].blocks[i] = 3;

    for(let i=0; i<13; i++) shiftPattern[1].blocks[i] = 3;
    for(let i=28; i<31; i++) shiftPattern[1].blocks[i] = 4;
    for(let i=36; i<48; i++) shiftPattern[1].blocks[i] = 1;

    for(let i=0; i<18; i++) shiftPattern[2].blocks[i] = 1;
    for(let i=20; i<28; i++) shiftPattern[2].blocks[i] = 4;
    for(let i=46; i<48; i++) shiftPattern[2].blocks[i] = 3;

    for(let i=0; i<14; i++) shiftPattern[3].blocks[i] = 3;
    for(let i=46; i<48; i++) shiftPattern[3].blocks[i] = 3;

    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    function generateUserCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for(let i=0; i<6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        return code;
    }

    function init() {
        const todayStr = getLocalDateString(new Date());
        els.targetDate.value = todayStr;

        let savedCode = localStorage.getItem('userCode');
        if (!savedCode) {
            savedCode = generateUserCode();
            localStorage.setItem('userCode', savedCode);
        }
        activeUserCode = savedCode;
        els.userCode.value = activeUserCode;
        
        startSync(activeUserCode);

        els.btnSync.addEventListener('click', () => {
            const inputCode = els.userCode.value.trim().toUpperCase();
            if(!inputCode) return alert("유저 코드를 입력하세요.");
            if(inputCode === activeUserCode) return alert("현재 기기에 이미 연동되어 있습니다.");
            
            if(confirm(`[${inputCode}] 코드로 연동하시겠습니까?\n기존 기기의 데이터로 실시간 덮어씌워집니다.`)) {
                activeUserCode = inputCode;
                localStorage.setItem('userCode', activeUserCode);
                startSync(activeUserCode);
            } else {
                els.userCode.value = activeUserCode; 
            }
        });

        // 상태 변경 시 렌더링 호출 (Firebase 저장은 별도로 처리)
        els.baseDate.addEventListener('change', (e) => { appState.baseDate = e.target.value; saveToFirebase(true); });
        els.baseShift.addEventListener('change', (e) => { appState.baseShift = e.target.value; saveToFirebase(true); });
        els.memo.addEventListener('input', (e) => { appState.memo = e.target.value; saveToFirebase(false); });
        els.targetDate.addEventListener('change', () => { renderWeekly(); });

        // 하단 탭 로직
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
                renderAll(); 
            });
        });

        const dmBtn = document.getElementById('darkModeToggle');
        if(localStorage.getItem('isDark') === 'true') toggleDark(true);
        dmBtn.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('isDark', isDark);
            toggleDark(isDark);
        });
        
        setInterval(updateNowMarker, 60000);
        updateDDay();
    }

    function toggleDark(isDark) {
        document.getElementById('darkModeToggle').innerText = isDark ? '☀️ 주간 모드 전환' : '🌙 야간 모드 전환';
        document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#0F172A' : '#F8FAFC');
        if(isDark) document.body.classList.add('dark-mode');
    }

    // --- Firebase 로직 (키보드 버그 픽스 핵심) ---
    function startSync(code) {
        if(unsubscribe) unsubscribe();
        els.syncIndicator.style.display = 'flex';
        
        const userRef = doc(db, "users", code);
        
        unsubscribe = onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                appState = { ...appState, ...data };
                if(!appState.dailyData) appState.dailyData = {};
                
                // 사용자가 폼에 입력 중일 때는 화면 렌더링을 멈춤 (키보드 내려감 방지)
                const activeTag = document.activeElement ? document.activeElement.tagName : '';
                const isTyping = activeTag === 'INPUT' || activeTag === 'TEXTAREA';
                
                if(!isTyping) {
                    els.memo.value = appState.memo || "";
                    els.baseDate.value = appState.baseDate || getLocalDateString(new Date());
                    els.baseShift.value = appState.baseShift || "0";
                    renderAll();
                }
            } else {
                saveToFirebase(true); 
            }
        });
    }

    let saveTimeout;
    // forceRender가 false면 DB에 데이터만 쏘고 UI는 건드리지 않음
    function saveToFirebase(forceRender = false) {
        if(forceRender) renderAll(); 
        if(!activeUserCode) return;
        
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            try { await setDoc(doc(db, "users", activeUserCode), appState); } 
            catch(e) { console.error("Sync Error:", e); }
        }, 800);
    }

    function getShiftIndexForDate(targetDateStr) {
        if(!appState.baseDate) return 0;
        const b = new Date(appState.baseDate + 'T00:00:00');
        const t = new Date(targetDateStr + 'T00:00:00');
        const diffDays = Math.round((t - b) / (1000 * 60 * 60 * 24));
        const bIdx = parseInt(appState.baseShift);
        return ((bIdx + diffDays) % 4 + 4) % 4;
    }

    // --- [탭 2] 일일 플래너 ---
    function renderToday() {
        const todayStr = getLocalDateString(new Date());
        const shiftIdx = getShiftIndexForDate(todayStr);
        els.todayBadge.innerText = `${todayStr.slice(5)} (${dayNames[new Date().getDay()]}) ${shiftPattern[shiftIdx].name}`;
        
        let html = '';
        const dayData = appState.dailyData[todayStr] || {};
        
        for(let i=0; i<48; i++) {
            const defaultType = shiftPattern[shiftIdx].blocks[i];
            
            let blockType = defaultType;
            let blockNote = '';
            if (dayData[i]) {
                if (dayData[i].type !== undefined) blockType = parseInt(dayData[i].type);
                if (dayData[i].note !== undefined) blockNote = dayData[i].note;
            }

            const hour = Math.floor(i / 2).toString().padStart(2, '0');
            const min = (i % 2 === 0) ? '00' : '30';
            
            html += `
                <div class="daily-row">
                    <div class="time-badge">${hour}:${min}</div>
                    <select class="type-select t-${blockType}" data-idx="${i}" onchange="window.updateDailyBlock(this)">
                        <option value="1" ${blockType === 1 ? 'selected' : ''}>업무</option>
                        <option value="2" ${blockType === 2 ? 'selected' : ''}>자유</option>
                        <option value="3" ${blockType === 3 ? 'selected' : ''}>수면</option>
                        <option value="4" ${blockType === 4 ? 'selected' : ''}>전략</option>
                    </select>
                    <input type="text" class="note-input" data-idx="${i}" placeholder="계획 및 기록 메모" value="${blockNote}" oninput="window.updateDailyBlock(this)">
                </div>
            `;
        }
        els.dailyList.innerHTML = html;
    }

    // 플래너 입력 시 전역 상태 반영 (화면 새로고침 없이 저장만 수행)
    window.updateDailyBlock = function(element) {
        const idx = element.getAttribute('data-idx');
        const todayStr = getLocalDateString(new Date());
        
        if(!appState.dailyData[todayStr]) appState.dailyData[todayStr] = {};
        if(!appState.dailyData[todayStr][idx]) {
            appState.dailyData[todayStr][idx] = { 
                type: shiftPattern[getShiftIndexForDate(todayStr)].blocks[idx], 
                note: '' 
            };
        }
        
        if(element.tagName === 'SELECT') {
            appState.dailyData[todayStr][idx].type = parseInt(element.value);
            element.className = `type-select t-${element.value}`; 
        } else {
            appState.dailyData[todayStr][idx].note = element.value;
        }
        
        saveToFirebase(false); // 키보드 버그 픽스: false로 전달하여 강제 새로고침 방지
    }

    // --- [탭 3] 일주일 전체 뷰 ---
    function renderWeekly() {
        const targetDStr = els.targetDate.value || getLocalDateString(new Date());
        const targetD = new Date(targetDStr + 'T00:00:00');
        let html = '';

        const classMap = { 1: 'bg-work', 2: 'bg-free', 3: 'bg-sleep-main', 4: 'bg-sleep-strat' };
        const nameMap = { 1: '업무', 2: '자유', 3: '정상 수면', 4: '전략 수면' };

        for(let i=0; i<7; i++) {
            const currentD = new Date(targetD);
            currentD.setDate(targetD.getDate() + i);
            const dateStr = getLocalDateString(currentD);
            
            const month = (currentD.getMonth() + 1).toString().padStart(2, '0');
            const date = currentD.getDate().toString().padStart(2, '0');
            const dayStr = dayNames[currentD.getDay()];
            
            const shiftIdx = getShiftIndexForDate(dateStr);
            const shiftInfo = shiftPattern[shiftIdx];
            const customDayData = appState.dailyData[dateStr] || {};

            html += `<div class="board-row" id="board-row-${dateStr}">`;
            html += `<div class="row-label"><span class="sub">${month}/${date}(${dayStr})</span>${shiftInfo.name}</div>`;
            html += `<div class="row-timeline">`;
            
            for(let j=0; j<48; j++) {
                let typeCode = shiftInfo.blocks[j];
                if (customDayData[j] && customDayData[j].type !== undefined) {
                    typeCode = parseInt(customDayData[j].type);
                }
                if (!classMap[typeCode]) typeCode = 2;
                
                const cls = classMap[typeCode];
                const typeName = nameMap[typeCode];
                
                const hour = Math.floor(j / 2).toString().padStart(2, '0');
                const min = (j % 2 === 0) ? '00' : '30';
                let tooltipStr = `${hour}:${min} - ${typeName}`;
                if(customDayData[j] && customDayData[j].note) {
                    tooltipStr += `<span class="tooltip-note">📝 ${customDayData[j].note}</span>`;
                }

                html += `<div class="block ${cls}" data-tooltip='${tooltipStr}' onclick="showBoardTooltip(event)" onmouseleave="hideBoardTooltip()"></div>`;
            }
            html += `</div></div>`;
        }
        els.grid.innerHTML = html;
        updateNowMarker();
    }

    const tooltipEl = document.getElementById('tooltip');
    window.showBoardTooltip = function(e) {
        const str = e.target.getAttribute('data-tooltip');
        if(!str) return;
        tooltipEl.innerHTML = str;
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        tooltipEl.style.left = clientX + 'px';
        tooltipEl.style.top = (clientY - 45) + 'px';
        tooltipEl.style.transform = 'translate(-50%, 0)';
        tooltipEl.style.opacity = '1';
        
        if (window.innerWidth <= 768) { setTimeout(hideBoardTooltip, 2500); }
    };
    window.hideBoardTooltip = function() { tooltipEl.style.opacity = '0'; };

    function updateNowMarker() {
        document.querySelectorAll('.now-marker').forEach(el => el.remove());
        const now = new Date();
        const row = document.getElementById(`board-row-${getLocalDateString(now)}`);
        if(row) {
            const timeline = row.querySelector('.row-timeline');
            const nowPercent = ((now.getHours() * 60 + now.getMinutes()) / 1440) * 100;
            const marker = document.createElement('div');
            marker.className = 'now-marker';
            marker.style.left = `${nowPercent}%`;
            timeline.appendChild(marker);
        }
    }

    function renderAll() {
        if(document.getElementById('tab-today').classList.contains('active')) renderToday();
        if(document.getElementById('tab-weekly').classList.contains('active')) renderWeekly();
    }

    function updateDDay() {
        const target = new Date('2026-08-22T00:00:00');
        const diff = Math.round((target - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('dDayDisplay').innerText = diff > 0 ? `D-${diff}` : (diff === 0 ? 'D-Day' : `D+${Math.abs(diff)}`);
    }

    init();
</script>

</body>
</html>
