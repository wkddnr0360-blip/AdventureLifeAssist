<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F8FAFC" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>주야비휴 라이프 어시스트</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-main: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-panel: #F1F5F9;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --input-bg: #FFFFFF;
            
            --work-bg: #1E3A8A;
            --free-bg: #DBEAFE;
            --sleep-main: #7C3AED;
            --sleep-strat: #C4B5FD;
        }

        body.dark-mode {
            --bg-main: #0F172A;
            --bg-card: #1E293B;
            --bg-panel: #334155;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --border: #475569;
            --input-bg: #1E293B;
            
            --work-bg: #3B82F6;
            --free-bg: #1E3A8A;
            --sleep-main: #A78BFA;
            --sleep-strat: #6D28D9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Pretendard", -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; justify-content: center;
            padding: 30px 15px;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            width: 100%; max-width: 1050px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            padding: 30px;
            transition: background-color 0.3s;
        }

        /* 헤더 & D-Day */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .d-day-badge {
            background: #EF4444; color: white; padding: 6px 14px;
            border-radius: 20px; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        /* 컨트롤 패널 */
        .control-panel {
            display: flex; flex-wrap: wrap; gap: 15px;
            background: var(--bg-panel); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 180px; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--text-sub); }
        input, select, button {
            padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 14px; outline: none;
            background: var(--input-bg); color: var(--text-main);
            transition: all 0.2s;
        }
        input:focus, select:focus { border-color: #3B82F6; }
        
        .btn-toggle {
            background: transparent; border: 1px solid var(--border); cursor: pointer;
            padding: 10px 15px; border-radius: 8px; font-weight: 600; color: var(--text-main);
            width: 100%;
        }
        .btn-toggle:hover { background: var(--border); }

        /* 범례 */
        .legend {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            margin-bottom: 15px; font-size: 13px; font-weight: 600; color: var(--text-main);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }
        
        .bg-work { background-color: var(--work-bg); }
        .bg-free { background-color: var(--free-bg); }
        .bg-sleep-main { background-color: var(--sleep-main); }
        .bg-sleep-strat { background-color: var(--sleep-strat); }

        /* 모바일 스크롤 유도 텍스트 */
        .scroll-hint { display: none; text-align: right; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: translateX(0); } 50% { opacity: 1; transform: translateX(-4px); } }

        /* 그리드 뷰 */
        .grid-wrapper {
            width: 100%; overflow-x: auto; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            margin-bottom: 25px; -webkit-overflow-scrolling: touch;
        }
        .time-grid {
            display: inline-grid;
            grid-template-columns: 120px repeat(48, minmax(20px, 1fr));
            min-width: max-content; border-bottom: 1px solid var(--border);
        }
        .time-grid:last-child { border-bottom: none; }
        .header-row { background: var(--bg-panel); position: sticky; top: 0; z-index: 5; }
        
        .cell { padding: 8px 0; text-align: center; font-size: 11px; color: var(--text-sub); border-right: 1px dashed var(--border); }
        .cell.time-header { grid-column: span 2; border-right: 1px solid var(--border); font-weight: 700; }
        
        .date-label {
            position: sticky; left: 0; background: var(--bg-card); padding: 0 15px;
            font-size: 13px; font-weight: 700; color: var(--text-main);
            border-right: 2px solid var(--border); z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .date-label span.date-sub { display: none; }
        .header-row .date-label { background: var(--bg-panel); z-index: 15; }

        .block { height: 100%; cursor: pointer; border-right: 1px solid rgba(0,0,0,0.02); transition: opacity 0.2s; }
        .block:active { opacity: 0.5; }
        
        .current-time-block {
            position: relative; background-color: #EF4444 !important; z-index: 20; transform: scaleY(1.1);
        }
        .current-time-block::before {
            content: 'NOW'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            background: #EF4444; color: white; font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 12px; z-index: 25;
        }

        /* 트리노트 퀵 메모 */
        .memo-panel { background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .memo-panel label { display: block; font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        textarea {
            width: 100%; height: 120px; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--input-bg);
            color: var(--text-main); font-family: inherit; font-size: 14px;
            resize: vertical; outline: none; line-height: 1.5;
        }

        /* 툴팁 */
        .tooltip {
            position: fixed; background: #0F172A; color: #FFFFFF; padding: 8px 12px;
            border-radius: 8px; font-size: 12px; font-weight: 600; pointer-events: none;
            opacity: 0; transition: opacity 0.15s; z-index: 999; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* ★★★ 모바일 최적화 (가독성 패치 핵심) ★★★ */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app-container { border-radius: 0; padding: 20px 15px; box-shadow: none; border: none; min-height: 100vh; }
            .header h1 { font-size: 20px; }
            .control-panel { flex-direction: column; gap: 12px; padding: 15px; }
            .input-group { min-width: 100%; }
            .scroll-hint { display: block; }
            .legend { font-size: 11px; gap: 8px; justify-content: flex-start; }
            
            /* 타임라인 폭 조정 & 좌측 요일칸 다이어트 */
            .time-grid { grid-template-columns: 60px repeat(48, minmax(20px, 1fr)); }
            .date-label { 
                padding: 5px; flex-direction: column; font-size: 13px; line-height: 1.3;
            }
            .date-label span.date-sub { display: block; font-size: 10px; color: var(--text-sub); margin-bottom: 2px; }
            .date-label span.date-text { display: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🚓 Adventure Life Assist</h1>
        <div id="dDayDisplay" class="d-day-badge">D-Day 계산중...</div>
    </div>
    
    <div class="control-panel">
        <div class="input-group">
            <label>1. 나의 목표 D-Day 설정</label>
            <input type="date" id="dDayInput">
        </div>
        <div class="input-group">
            <label>2. 기준 근무 (주기 리셋용)</label>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="baseDate" style="flex: 1;">
                <select id="baseShift" style="flex: 1;">
                    <option value="0">주간 근무</option>
                    <option value="1">야간 근무</option>
                    <option value="2">비번 (퇴근)</option>
                    <option value="3">휴무 (휴식)</option>
                </select>
            </div>
        </div>
        <div class="input-group" style="flex-direction: row; align-items: flex-end; gap: 10px;">
            <div style="flex: 2; display: flex; flex-direction: column; gap: 8px;">
                <label>3. 달력 조회 시작일</label>
                <input type="date" id="targetDate">
            </div>
            <div style="flex: 1;">
                <button id="darkModeToggle" class="btn-toggle">🌙 야간</button>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot bg-work"></div>업무</div>
        <div class="legend-item"><div class="dot bg-free"></div>자유</div>
        <div class="legend-item"><div class="dot bg-sleep-main"></div>정상 수면</div>
        <div class="legend-item"><div class="dot bg-sleep-strat"></div>전략 수면(낮/앵커)</div>
    </div>

    <div class="scroll-hint">👉 타임라인을 좌우로 스크롤 하세요</div>
    
    <div class="grid-wrapper" id="gridContainer"></div>

    <div class="memo-panel">
        <label>📝 트리노트 퀵 메모 (자동 저장)</label>
        <textarea id="quickMemo" placeholder="- [판례] 
  - 핵심 포인트:
  - 예외 지문:
- [루틴]
  - 런닝 페이스:"></textarea>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }

    /* 1. 커스텀 D-Day 로직 */
    const dDayInput = document.getElementById('dDayInput');
    dDayInput.value = localStorage.getItem('targetDDay') || '2026-08-22';
    
    dDayInput.addEventListener('change', () => {
        localStorage.setItem('targetDDay', dDayInput.value);
        updateDDay();
    });

    function updateDDay() {
        if(!dDayInput.value) return;
        const targetDate = new Date(dDayInput.value + 'T00:00:00+09:00');
        const today = new Date();
        today.setHours(0,0,0,0);
        targetDate.setHours(0,0,0,0);
        
        const diffTime = targetDate - today;
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
        
        const dDayEl = document.getElementById('dDayDisplay');
        if (diffDays > 0) dDayEl.innerText = `D-${diffDays}`;
        else if (diffDays === 0) dDayEl.innerText = `D-Day`;
        else {
            dDayEl.innerText = `D+${Math.abs(diffDays)}`;
            dDayEl.style.background = '#64748B';
        }
    }

    /* 2. 다크 모드 및 메모 로컬 스토리지 로직 */
    const memoEl = document.getElementById('quickMemo');
    const darkModeBtn = document.getElementById('darkModeToggle');
    
    memoEl.value = localStorage.getItem('treeNoteMemo') || '';
    memoEl.addEventListener('input', () => localStorage.setItem('treeNoteMemo', memoEl.value));

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('isDarkMode', isDark);
        darkModeBtn.innerText = isDark ? '☀️ 주간' : '🌙 야간';
        document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#0F172A' : '#F8FAFC');
    }
    if (localStorage.getItem('isDarkMode') === 'true') toggleDarkMode();
    darkModeBtn.addEventListener('click', toggleDarkMode);

    /* 3. 스케줄러 핵심 로직 */
    const shiftPattern = {
        0: { name: '주간', blocks: Array(48).fill(2) },
        1: { name: '야간', blocks: Array(48).fill(2) },
        2: { name: '비번', blocks: Array(48).fill(2) },
        3: { name: '휴무', blocks: Array(48).fill(2) }
    };
    function fillBlocks(shiftIdx, start, length, type) {
        for(let i = start; i < start + length; i++) shiftPattern[shiftIdx].blocks[i] = type;
    }
    fillBlocks(0, 0, 13, 3); fillBlocks(0, 18, 18, 1); fillBlocks(0, 46, 2, 3);
    fillBlocks(1, 0, 13, 3); fillBlocks(1, 28, 3, 4); fillBlocks(1, 36, 12, 1);
    fillBlocks(2, 0, 18, 1); fillBlocks(2, 20, 8, 4); fillBlocks(2, 46, 2, 3);
    fillBlocks(3, 0, 14, 3); fillBlocks(3, 46, 2, 3);

    const typeMap = { 
        1: {cls: 'bg-work', label:'근무'}, 2: {cls: 'bg-free', label:'자유'}, 
        3: {cls: 'bg-sleep-main', label:'정상 수면'}, 4: {cls: 'bg-sleep-strat', label:'전략 수면'}
    };
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    const elBaseDate = document.getElementById('baseDate');
    const elBaseShift = document.getElementById('baseShift');
    const elTargetDate = document.getElementById('targetDate');
    const elGridContainer = document.getElementById('gridContainer');
    const elTooltip = document.getElementById('tooltip');

    function getSafeDate(dateString) {
        const parts = dateString.split('-');
        return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function initScheduler() {
        const todayStr = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        
        elBaseDate.value = localStorage.getItem('shiftBaseDate') || todayStr;
        elBaseShift.value = localStorage.getItem('shiftBaseIndex') || '0';
        elTargetDate.value = localStorage.getItem('shiftTargetDate') || todayStr;

        [elBaseDate, elBaseShift, elTargetDate].forEach(el => {
            el.addEventListener('change', renderGrid);
        });

        renderGrid();
        setInterval(markCurrentTime, 60000); 
    }

    function renderGrid() {
        localStorage.setItem('shiftBaseDate', elBaseDate.value);
        localStorage.setItem('shiftBaseIndex', elBaseShift.value);
        localStorage.setItem('shiftTargetDate', elTargetDate.value);

        const baseD = getSafeDate(elBaseDate.value);
        const targetD = getSafeDate(elTargetDate.value);
        const baseIndex = parseInt(elBaseShift.value);
        const diffDays = Math.round((targetD - baseD) / (1000 * 60 * 60 * 24));

        let html = '';
        html += '<div class="time-grid header-row"><div class="date-label">날짜</div>';
        for(let i = 0; i < 24; i++) html += `<div class="cell time-header">${i.toString().padStart(2, '0')}</div>`;
        html += '</div>';

        for(let i = 0; i < 7; i++) {
            const currentD = new Date(targetD);
            currentD.setDate(targetD.getDate() + i);
            const dateStrId = currentD.toISOString().split('T')[0]; 
            
            const month = (currentD.getMonth() + 1).toString().padStart(2, '0');
            const date = currentD.getDate().toString().padStart(2, '0');
            const dayStr = dayNames[currentD.getDay()];
            
            const shiftIndex = ((baseIndex + diffDays + i) % 4 + 4) % 4;
            const shiftInfo = shiftPattern[shiftIndex];

            html += `<div class="time-grid" id="row-${dateStrId}">`;
            // 모바일용 쪼개진 텍스트(span.date-sub)와 데스크탑용 텍스트(span.date-text) 결합
            html += `<div class="date-label"><span class="date-sub">${month}/${date}(${dayStr})</span><span class="date-text">${month}/${date}(${dayStr}) </span>${shiftInfo.name}</div>`;
            
            shiftInfo.blocks.forEach((typeCode, blockIndex) => {
                const typeData = typeMap[typeCode];
                const hour = Math.floor(blockIndex / 2).toString().padStart(2, '0');
                const min = (blockIndex % 2 === 0) ? '00' : '30';
                
                html += `<div class="block ${typeData.cls}" 
                              id="block-${dateStrId}-${blockIndex}"
                              data-time="${hour}:${min}" 
                              data-type="${typeData.label}"
                              onclick="showTooltip(event)"
                              onmouseleave="hideTooltip()"></div>`;
            });
            html += `</div>`;
        }
        elGridContainer.innerHTML = html;
        markCurrentTime(); 
    }

    function markCurrentTime() {
        document.querySelectorAll('.current-time-block').forEach(el => el.classList.remove('current-time-block'));
        
        const now = new Date();
        const todayStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        const blockIndex = (now.getHours() * 2) + (now.getMinutes() >= 30 ? 1 : 0);
        
        const targetBlock = document.getElementById(`block-${todayStr}-${blockIndex}`);
        
        if(targetBlock) {
            targetBlock.classList.add('current-time-block');
        }
    }

    /* 터치 및 마우스 툴팁 중앙 상단 보정 */
    window.showTooltip = function(e) {
        const target = e.target;
        const time = target.getAttribute('data-time');
        const type = target.getAttribute('data-type');
        elTooltip.innerHTML = `<span style="color:#94A3B8;">${time}</span><br/>${type}`;
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        // 손가락에 가려지지 않게 탭한 위치 기준 위로 45px 띄우고 정중앙 정렬
        elTooltip.style.left = clientX + 'px';
        elTooltip.style.top = (clientY - 45) + 'px';
        elTooltip.style.transform = 'translate(-50%, 0)'; 
        elTooltip.style.opacity = '1';
        
        // 모바일에서 터치 후 1.5초 뒤 자동 숨김 처리
        if (window.innerWidth <= 768) {
            setTimeout(hideTooltip, 1500);
        }
    };
    
    window.hideTooltip = function() {
        elTooltip.style.opacity = '0';
    };

    updateDDay();
    initScheduler();
</script>

</body>
</html>
